esphome:
  name: kempervanas
  friendly_name: Kempervanas
  on_boot:
    priority: 250
    then:
      - lambda: |-
          // Pažadinam ADXL345 (measurement mode)
          uint8_t data[2] = {0x2D, 0x08};
          id(i2c_bus)->write(0x53, data, 2, true);
      - delay: 1s
      - script.execute: a7670e_init

external_components:
  - source:
      type: local
      path: components

esp32:
  board: esp32-s3-devkitc-1
  framework: { type: esp-idf }

debug:
  update_interval: 30s

wifi:
  ap:
    ssid: "Kemperis-Valdymas"
    password: "kemperis123"

web_server_base:
  id: my_web_server_base

web_server:
  port: 80
  version: 2
  local: true

dashboard_endpoint:
  web_server_base_id: my_web_server_base

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG

i2c:
  - id: i2c_bus
    sda: GPIO9
    scl: GPIO10
    scan: true
    frequency: 50kHz

# ==========================================
# 🔌 UART
# ==========================================
uart:
  # A7670E GSM/GPS modemas
  - id: uart_a7670e
    tx_pin: GPIO40
    rx_pin: GPIO41
    baud_rate: 115200
    rx_buffer_size: 2048
  # (Modbus UART pašalintas)

pcf8574:
  - id: pcf_out1
    address: 0x24
  - id: pcf_out2
    address: 0x25
  - id: pcf_in1
    address: 0x21
  - id: pcf_in2
    address: 0x22

# ==========================================
# 🌐 GLOBALŪS KINTAMIEJI
# ==========================================
globals:
  - id: uart_buf
    type: std::string
    initial_value: '""'
  - id: sms_sender
    type: std::string
    initial_value: '""'
  - id: gsm_signal_val
    type: int
    initial_value: "0"
  - id: gsm_operator
    type: std::string
    initial_value: '"Ieškoma..."'
  - id: gps_lat
    type: float
    initial_value: "0.0"
  - id: gps_lon
    type: float
    initial_value: "0.0"
  - id: gps_alt
    type: float
    initial_value: "0.0"
  - id: gps_speed_val
    type: float
    initial_value: "0.0"
  - id: gps_course_val
    type: float
    initial_value: "0.0"
  - id: gps_sats_gps
    type: int
    initial_value: "0"
  - id: gps_sats_glonass
    type: int
    initial_value: "0"
  - id: gps_sats_beidou
    type: int
    initial_value: "0"
  - id: gps_fix
    type: bool
    initial_value: "false"
  - id: cal_roll
    type: float
    restore_value: true
    initial_value: "0.0"
  - id: cal_pitch
    type: float
    restore_value: true
    initial_value: "0.0"
  - id: raw_roll
    type: float
    initial_value: "0.0"
  - id: raw_pitch
    type: float
    initial_value: "0.0"
  - id: trip_odometer
    type: float
    restore_value: true
    initial_value: "0.0"
  - id: hx711_zero_raw
    type: float
    restore_value: true
    initial_value: "622900.0"
  - id: pressure_hist
    type: float[7]
    restore_value: true
    initial_value: "{0,0,0,0,0,0,0}"
  - id: pressure_hist_count
    type: int
    restore_value: true
    initial_value: "0"

# ==========================================
# 🛠 NUSTATYMAI (per UI)
# ==========================================
number:
  - platform: template
    name: "Bako TUSCIAS (cm)"
    id: tank_fresh_empty
    min_value: 0
    max_value: 200
    step: 1
    initial_value: 40
    restore_value: true
    optimistic: true
    unit_of_measurement: "cm"

  - platform: template
    name: "Bako PILNAS (cm)"
    id: tank_fresh_full
    min_value: 0
    max_value: 200
    step: 1
    initial_value: 5
    restore_value: true
    optimistic: true
    unit_of_measurement: "cm"

  - platform: template
    name: "Baliono TARA (kg)"
    id: cylinder_tare
    min_value: 0
    max_value: 20
    step: 0.1
    initial_value: 3.8
    restore_value: true
    optimistic: true
    unit_of_measurement: "kg"

  - platform: template
    name: "Temperatūros korekcija"
    id: temp_offset
    min_value: -10
    max_value: 10
    step: 0.1
    initial_value: -0.6
    restore_value: true
    optimistic: true
    unit_of_measurement: "°C"

  - platform: template
    name: "Svarstyklių faktorius"
    id: hx711_kg_per_count
    min_value: 0.00001
    max_value: 0.0001
    step: 0.000001
    initial_value: 0.00005623
    restore_value: true
    optimistic: true

  - platform: template
    name: "Dujos: Etalono svoris (kalibravimui)"
    id: gas_ref_weight
    min_value: 0.5
    max_value: 30
    step: 0.1
    initial_value: 5.0
    restore_value: true
    optimistic: true
    unit_of_measurement: "kg"

  - platform: template
    name: "Jūros lygio slėgis (QNH)"
    id: sea_level_pressure
    min_value: 950
    max_value: 1080
    step: 0.1
    initial_value: 1013.25
    restore_value: true
    optimistic: true
    unit_of_measurement: "hPa"

# ==========================================
# 🔘 MYGTUKAI
# ==========================================
button:
  - platform: template
    name: "Kalibruoti Posvyri"
    id: btn_cal_tilt
    on_press:
      - lambda: |-
          id(cal_roll) = id(raw_roll);
          id(cal_pitch) = id(raw_pitch);

  - platform: template
    name: "Nulinti kelionę"
    id: btn_reset_odometer
    on_press:
      - lambda: 'id(trip_odometer) = 0.0;'

  - platform: template
    name: "Dujos: Taruoti svarstykles"
    id: btn_gas_tare
    on_press:
      - lambda: |-
          float raw = id(hx711_raw).state;
          if (!isnan(raw)) {
            id(hx711_zero_raw) = raw;
            ESP_LOGI("gas", "Tare: zero_raw=%.0f", raw);
          }

  - platform: template
    name: "Dujos: Kalibruoti pagal etaloną"
    id: btn_gas_cal_span
    on_press:
      - lambda: |-
          float raw = id(hx711_raw).state;
          float ref_kg = id(gas_ref_weight).state;
          if (!isnan(raw) && ref_kg > 0.1f) {
            float counts = raw - id(hx711_zero_raw);
            if (counts > 100) {
              auto call = id(hx711_kg_per_count).make_call();
              call.set_value(ref_kg / counts);
              call.perform();
              ESP_LOGI("gas", "Span cal: %.8f kg/count (ref=%.2f kg, counts=%.0f)",
                ref_kg / counts, ref_kg, counts);
            } else {
              ESP_LOGW("gas", "Span cal skipped: counts too low (%.0f)", counts);
            }
          }

# ==========================================
# 📊 SENSORIAI
# ==========================================
sensor:
  # --- HX711 (vidinis) ---
  - platform: hx711
    id: hx711_raw
    internal: true
    dout_pin: GPIO47
    clk_pin: GPIO48
    gain: 128
    update_interval: 2s
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1

  - platform: template
    name: "Dujos: Bendras svoris"
    id: gas_total
    unit_of_measurement: "kg"
    accuracy_decimals: 2
    update_interval: 3s
    lambda: |-
      float raw = id(hx711_raw).state;
      if (isnan(raw)) return NAN;
      return (raw - id(hx711_zero_raw)) * id(hx711_kg_per_count).state;

  - platform: template
    name: "Dujų likutis (Neto)"
    id: gas_net
    unit_of_measurement: "kg"
    accuracy_decimals: 2
    update_interval: 3s
    lambda: 'return max(0.0f, id(gas_total).state - id(cylinder_tare).state);'

  # --- Vanduo ---
  - platform: vl53l0x
    id: water_laser_raw
    address: 0x29
    update_interval: 2s

  - platform: template
    name: "Vanduo: Lygis (cm)"
    id: water_cm
    unit_of_measurement: "cm"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: |-
      if (!id(water_laser_raw).has_state()) return NAN;
      return id(water_laser_raw).state * 100.0f;

  - platform: template
    name: "Vandens Bako užpildymas"
    id: water_pct
    unit_of_measurement: "%"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: |-
      float v_cm = id(water_cm).state;
      float diff = id(tank_fresh_full).state - id(tank_fresh_empty).state;
      if (isnan(v_cm) || abs(diff) < 0.1f) return NAN;
      return clamp((v_cm - id(tank_fresh_empty).state) / diff * 100.0f, 0.0f, 100.0f);

  - platform: adc
    pin: GPIO7
    id: tds_raw_v
    attenuation: 12db
    update_interval: 1s
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1

  - platform: template
    name: "Vandens Kokybė (TDS)"
    id: water_tds
    unit_of_measurement: "PPM"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      float v = id(tds_raw_v).state;
      if (isnan(v) || v <= 0.05f) return 0.0f;
      if (v > 2.3f) v = 2.3f;
      return (133.42f * v * v * v - 255.86f * v * v + 857.39f * v) * 0.5f;

  # --- Klimatas ---
  - platform: bmp085
    temperature:
      id: cabin_temp_raw
      internal: true
    pressure:
      name: "Atmosferos slėgis"
      id: cabin_pres
      accuracy_decimals: 2
    update_interval: 10s

  - platform: template
    name: "Temperatūra (Kajutė)"
    id: cabin_temp
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      if (isnan(id(cabin_temp_raw).state)) return NAN;
      return id(cabin_temp_raw).state + id(temp_offset).state;

  - platform: template
    name: "Aukštis (barometrinis)"
    id: altitude_baro
    unit_of_measurement: "m"
    accuracy_decimals: 1
    update_interval: 30s
    lambda: |-
      float p = id(cabin_pres).state;
      float p0 = id(sea_level_pressure).state;
      if (isnan(p) || p <= 0 || p0 <= 0) return NAN;
      return 44330.0f * (1.0f - pow(p / p0, 0.1903f));

  - platform: template
    name: "Slėgio tendencija (3 val)"
    id: pressure_trend
    unit_of_measurement: "hPa"
    accuracy_decimals: 2
    update_interval: 60s
    lambda: |-
      if (id(pressure_hist_count) < 2) return NAN;
      int idx = id(pressure_hist_count) - 1;
      if (idx > 6) idx = 6;
      float oldest = id(pressure_hist)[idx];
      float now = id(cabin_pres).state;
      if (isnan(now) || oldest <= 0) return NAN;
      float hours = idx * 0.5f;
      if (hours < 0.4f) return NAN;
      return (now - oldest) * (3.0f / hours);

  # --- ESP32 vidinė temperatūra ---
  - platform: internal_temperature
    name: "Sistema: ESP temperatūra"
    id: esp_temp
    update_interval: 30s

  # --- Posvyris ---
  - platform: template
    name: "Posvyris (Kairė-Dešinė)"
    id: roll_sensor
    unit_of_measurement: "°"
    accuracy_decimals: 1
    update_interval: 1s
    filters:
      - timeout: 30s
    lambda: |-
      static bool prev_ok = true;
      uint8_t reg = 0x32; uint8_t raw[6];
      id(i2c_bus)->write(0x53, &reg, 1, false);
      if (id(i2c_bus)->read(0x53, raw, 6) != 0) {
        if (prev_ok) ESP_LOGW("tilt", "ADXL345 nuskaitymo klaida (disconnected?)");
        prev_ok = false;
        return {};
      }
      if (!prev_ok) {
        ESP_LOGI("tilt", "ADXL345 atsistatė");
        prev_ok = true;
      }
      int16_t y = (int16_t)(raw[2] | (raw[3] << 8));
      int16_t z = (int16_t)(raw[4] | (raw[5] << 8));
      float angle = atan2((float)y, (float)z) * 180.0f / M_PI;
      id(raw_roll) = angle;
      return angle - id(cal_roll);

  - platform: template
    name: "Posvyris (Priekis-Galas)"
    id: pitch_sensor
    unit_of_measurement: "°"
    accuracy_decimals: 1
    update_interval: 1s
    filters:
      - timeout: 30s
    lambda: |-
      uint8_t reg = 0x32; uint8_t raw[6];
      id(i2c_bus)->write(0x53, &reg, 1, false);
      if (id(i2c_bus)->read(0x53, raw, 6) != 0) return {};
      int16_t x = (int16_t)(raw[0] | (raw[1] << 8));
      int16_t z = (int16_t)(raw[4] | (raw[5] << 8));
      float angle = atan2((float)x, (float)z) * 180.0f / M_PI;
      id(raw_pitch) = angle;
      return angle - id(cal_pitch);

  # --- GPS / GSM ---
  - platform: template
    name: "GPS: Aukštis"
    id: gps_alt_sensor
    unit_of_measurement: "m"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: 'return id(gps_fix) ? id(gps_alt) : NAN;'

  - platform: template
    name: "GPS: Greitis"
    id: gps_speed
    unit_of_measurement: "km/h"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: 'return id(gps_fix) ? id(gps_speed_val) : 0.0f;'

  - platform: template
    name: "GPS: Kursas"
    id: gps_course
    unit_of_measurement: "°"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: 'return id(gps_fix) ? id(gps_course_val) : NAN;'

  - platform: template
    name: "GPS: Palydovai"
    id: gps_sats
    unit_of_measurement: "vnt"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: 'return (float)(id(gps_sats_gps) + id(gps_sats_glonass) + id(gps_sats_beidou));'

  - platform: template
    name: "GSM: Ryšio kokybė"
    id: gsm_signal
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      if (id(gsm_signal_val) == 99 || id(gsm_signal_val) == 0) return 0.0f;
      return (id(gsm_signal_val) / 31.0f) * 100.0f;

  - platform: template
    name: "Kelionės atstumas"
    id: odometer
    unit_of_measurement: "km"
    accuracy_decimals: 2
    update_interval: 10s
    lambda: 'return id(trip_odometer);'

  - platform: uptime
    name: "Sistema: Darbo laikas"
    id: uptime_sensor
    update_interval: 60s

  - platform: debug
    free:
      name: "Sistema: Laisva atmintis"
      id: heap_free

# ==========================================
# 🔤 TEKSTINIAI SENSORIAI
# ==========================================
text_sensor:
  - platform: template
    name: "GSM: Operatorius"
    id: gsm_op
    update_interval: 10s
    lambda: 'return id(gsm_operator);'

  - platform: template
    name: "GPS: Koordinatės"
    id: gps_coords
    update_interval: 5s
    lambda: |-
      if (!id(gps_fix)) return std::string("Ieškoma...");
      char buf[48];
      snprintf(buf, sizeof(buf), "%.6f, %.6f", id(gps_lat), id(gps_lon));
      return std::string(buf);

  - platform: template
    name: "Orų prognozė"
    id: weather_forecast
    update_interval: 60s
    lambda: |-
      if (id(pressure_hist_count) < 2) {
        char b[40];
        snprintf(b, sizeof(b), "Kaupiama (%d/7)", id(pressure_hist_count));
        return std::string(b);
      }
      int idx = id(pressure_hist_count) - 1;
      if (idx > 6) idx = 6;
      float oldest = id(pressure_hist)[idx];
      float now = id(cabin_pres).state;
      if (isnan(now) || oldest <= 0) return std::string("Nežinoma");
      float hours = idx * 0.5f;
      float trend = (now - oldest) * (3.0f / hours);
      std::string tend;
      if (trend > 6.0f)       tend = "Sparčiai gerėja ☀️";
      else if (trend > 3.0f)  tend = "Gerėja 🌤";
      else if (trend > 1.0f)  tend = "Lėtai gerėja 🌤";
      else if (trend > -1.0f) tend = "Stabilu ⛅";
      else if (trend > -3.0f) tend = "Lėtai blogėja 🌥";
      else if (trend > -6.0f) tend = "Blogėja 🌧";
      else                    tend = "Audra artėja ⛈";
      std::string level;
      if (now > 1025.0f)      level = "Aukšt. slėg., ";
      else if (now < 1005.0f) level = "Žem. slėg., ";
      return level + tend;

# ==========================================
# ⚡ BINARY SENSORIAI
# ==========================================
binary_sensor:
  - platform: gpio
    id: power_220v
    name: "Išorinis 220V Tinklas"
    pin: { pcf8574: pcf_in2, number: 0, mode: INPUT, inverted: true }

  - platform: template
    name: "GPS: Signalas"
    id: gps_fix_sensor
    lambda: 'return id(gps_fix);'

# ==========================================
# ⚙️ SKRIPTAI
# ==========================================
script:
  - id: a7670e_init
    then:
      - uart.write: { id: uart_a7670e, data: "AT\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+CMGF=1\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+CNMI=2,1,0,0,0\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+COPS=3,0\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+CGNSSPWR=1\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+CGNSSMODE=3\r\n" }

  - id: send_status_sms
    parameters:
      target_num: std::string
    then:
      - uart.write:
          id: uart_a7670e
          data: !lambda |-
            std::string cmd = "AT+CMGS=\"" + target_num + "\"\r\n";
            return std::vector<uint8_t>(cmd.begin(), cmd.end());
      - delay: 2s
      - uart.write:
          id: uart_a7670e
          data: !lambda |-
            char m[200];
            float v = 0; // Kai grįš baterijos duomenys, atnaujinkite
            float a = 0;
            float pct = 0;
            float w = id(water_pct).state;
            float g = id(gas_net).state;
            float ct = id(cabin_temp).state;
            int sats = id(gps_sats_gps) + id(gps_sats_glonass) + id(gps_sats_beidou);
            const char* pwr = id(power_220v).state ? "TAIP" : "NE";

            snprintf(m, sizeof(m),
              "Kemperis:\n"
              "Bat %.1fV %.1fA (%.0f%%)\n"
              "T: in %.1fC bat -\n"
              "Vanduo %.0f%% dujos %.1fkg\n"
              "220V: %s\n"
              "GPS %.6f,%.6f\n"
              "Sp %.0fkmh sat %d\n"
              "%s (%d%%)\x1A",
              v, a, pct,
              isnan(ct)?0:ct,
              isnan(w)?0:w, isnan(g)?0:g, pwr,
              id(gps_lat), id(gps_lon),
              id(gps_speed_val), sats,
              id(gsm_operator).c_str(), (int)id(gsm_signal).state);
            return std::vector<uint8_t>(m, m + strlen(m));

# ==========================================
# ⏱ INTERVALAI
# ==========================================
interval:
  # A7670E UART parseris
  - interval: 200ms
    then:
      - lambda: |-
          uint8_t byte;
          while (id(uart_a7670e).available() > 0) {
            if (!id(uart_a7670e).read_byte(&byte)) break;

            if (id(uart_buf).size() > 1024) {
              ESP_LOGW("a7670e", "UART buffer overflow, clearing");
              id(uart_buf).clear();
            }

            char c = (char)byte;
            if (c != '\r') id(uart_buf) += c;
            if (c != '\n') continue;

            std::string line = id(uart_buf);
            id(uart_buf).clear();
            while (!line.empty() && (line.back() == '\n' || line.back() == '\r'))
              line.pop_back();
            if (line.empty()) continue;

            // SMS apdorojimas (nepakeistas)
            if (line.find("+CMTI:") != std::string::npos) {
              id(uart_a7670e).write_str("AT+CMGL=\"ALL\"\r\n");
              continue;
            }

            size_t cmgl = line.find("+CMGL:");
            if (cmgl != std::string::npos) {
              size_t q1 = line.find("\",\"");
              size_t q2 = (q1 != std::string::npos) ? line.find("\",\"", q1 + 3) : std::string::npos;
              if (q1 != std::string::npos && q2 != std::string::npos) {
                id(sms_sender) = line.substr(q1 + 3, q2 - q1 - 3);
              }
              continue;
            }

            if (line.find("Status") != std::string::npos && !id(sms_sender).empty()) {
              id(send_status_sms).execute(id(sms_sender));
              id(uart_a7670e).write_str("AT+CMGD=1,3\r\n");
              id(sms_sender).clear();
              continue;
            }

            // Signalo stiprumas: +CSQ
            size_t csq = line.find("+CSQ:");
            if (csq != std::string::npos) {
              size_t s = csq + 5;
              while (s < line.size() && line[s] == ' ') s++;
              size_t cm = line.find(',', s);
              if (cm != std::string::npos) {
                id(gsm_signal_val) = atoi(line.substr(s, cm - s).c_str());
              }
              continue;
            }

            // Operatorius: +COPS
            size_t cops = line.find("+COPS:");
            if (cops != std::string::npos) {
              size_t q1 = line.find('"', cops);
              size_t q2 = (q1 != std::string::npos) ? line.find('"', q1 + 1) : std::string::npos;
              if (q1 != std::string::npos && q2 != std::string::npos) {
                id(gsm_operator) = line.substr(q1 + 1, q2 - q1 - 1);
              } else {
                id(gsm_operator) = "Neregistruotas";
              }
              continue;
            }

            // GPS info (original +CGNSSINFO formatas)
            size_t gn = line.find("+CGNSSINFO:");
            if (gn != std::string::npos) {
              std::string d = line.substr(gn + 11);
              while (!d.empty() && (d[0] == ' ' || d[0] == '\t')) d.erase(0, 1);
              std::vector<std::string> f;
              size_t p = 0;
              while (true) {
                size_t n = d.find(',', p);
                if (n == std::string::npos) { f.push_back(d.substr(p)); break; }
                f.push_back(d.substr(p, n - p));
                p = n + 1;
              }

              auto valid_coord = [](const std::string& s) -> bool {
                if (s.empty()) return false;
                bool has_nonzero = false;
                for (char c : s) {
                  if (c >= '1' && c <= '9') { has_nonzero = true; break; }
                }
                return has_nonzero;
              };

              int mode = (f.size() > 0 && !f[0].empty()) ? atoi(f[0].c_str()) : 0;
              bool has_fix = (mode == 2 || mode == 3) &&
                             f.size() >= 13 &&
                             valid_coord(f[4]) && valid_coord(f[6]) &&
                             (f[5] == "N" || f[5] == "S") &&
                             (f[7] == "E" || f[7] == "W");

              if (has_fix) {
                id(gps_sats_gps)     = atoi(f[1].c_str());
                id(gps_sats_glonass) = atoi(f[2].c_str());
                id(gps_sats_beidou)  = atoi(f[3].c_str());

                float lr = atof(f[4].c_str());
                int ld = (int)(lr / 100.0f);
                float lat = ld + (lr - ld * 100.0f) / 60.0f;
                if (f[5] == "S") lat = -lat;

                float lnr = atof(f[6].c_str());
                int lnd = (int)(lnr / 100.0f);
                float lon = lnd + (lnr - lnd * 100.0f) / 60.0f;
                if (f[7] == "W") lon = -lon;

                if (lat >= -90.0f && lat <= 90.0f && lon >= -180.0f && lon <= 180.0f) {
                  id(gps_lat) = lat;
                  id(gps_lon) = lon;
                  id(gps_fix) = true;

                  if (!f[10].empty()) {
                    float alt = atof(f[10].c_str());
                    if (alt > -500.0f && alt < 10000.0f) id(gps_alt) = alt;
                  }
                  if (!f[11].empty()) {
                    float kn = atof(f[11].c_str());
                    float kmh = kn * 1.852f;
                    if (kmh >= 0.0f && kmh < 300.0f) id(gps_speed_val) = kmh;
                  }
                  if (!f[12].empty()) {
                    float c = atof(f[12].c_str());
                    if (c >= 0.0f && c <= 360.0f) id(gps_course_val) = c;
                  }
                } else {
                  id(gps_fix) = false;
                }
              } else {
                id(gps_fix) = false;
                id(gps_lat) = 0.0f;
                id(gps_lon) = 0.0f;
                id(gps_alt) = 0.0f;
                id(gps_speed_val) = 0.0f;
                id(gps_course_val) = 0.0f;
                id(gps_sats_gps) = 0;
                id(gps_sats_glonass) = 0;
                id(gps_sats_beidou) = 0;
              }
              continue;
            }
          }

  # Periodinės modemo užklausos (naudojamas AT+CGNSSINFO)
  - interval: 20s
    then:
      - uart.write: { id: uart_a7670e, data: "AT+CSQ\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+COPS?\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+CGNSSINFO\r\n" }  # Jei neveikia, pakeisti į AT+CGNSINF

  # Odometras
  - interval: 10s
    then:
      - lambda: |-
          if (id(gps_fix) && id(gps_speed_val) > 5.0f) {
            id(trip_odometer) += id(gps_speed_val) * (10.0f / 3600.0f);
          }

  # Slėgio istorija
  - interval: 30min
    then:
      - lambda: |-
          float p = id(cabin_pres).state;
          if (isnan(p) || p <= 0) return;
          if (id(pressure_hist_count) == 0) {
            for (int i = 0; i < 7; i++) id(pressure_hist)[i] = p;
            id(pressure_hist_count) = 1;
            return;
          }
          for (int i = 6; i > 0; i--) id(pressure_hist)[i] = id(pressure_hist)[i-1];
          id(pressure_hist)[0] = p;
          if (id(pressure_hist_count) < 7) id(pressure_hist_count)++;