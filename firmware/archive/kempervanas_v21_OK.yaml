button:
  - platform: template
    name: "btn_wake_up"
    id: btn_wake_up
    on_press:
      - lambda: |-
          if (id(low_power_mode)) {
            id(low_power_mode) = false;
            id(uart_a7670e).write_str("AT+CGNSSPWR=1\r\n");
            ESP_LOGI("power", "⚡ Rankinis žadinimas iš miego");
          }
  - platform: template
    name: "btn_adxl_zero"
    id: btn_adxl_zero
    on_press:
      - lambda: |-
          // Kalibracija: naudojame jau išfiltruotą roll/pitch reikšmę (ne raw I2C vieną tašką)
          if (id(roll_sensor).has_state() && id(pitch_sensor).has_state() &&
              !isnan(id(roll_sensor).state) && !isnan(id(pitch_sensor).state)) {
            // Prie esamos kalibracijos pridedame dabartinį nuokrypį
            id(cal_roll)  += id(roll_sensor).state;
            id(cal_pitch) += id(pitch_sensor).state;
            id(adxl_needs_reset) = true;
            id(roll_sensor).publish_state(0.0f);
            id(pitch_sensor).publish_state(0.0f);
            ESP_LOGI("adxl_cal", "Kalibracija baigta: cal_roll=%.2f cal_pitch=%.2f", id(cal_roll), id(cal_pitch));
          } else {
            ESP_LOGW("adxl_cal", "Nėra stabilių ADXL duomenų kalibravimui — palaukite kelias sekundes!");
          }
  - platform: template
    name: "btn_gas_tare"
    id: btn_gas_tare
    on_press:
      - lambda: 'if (id(gas_hx711_raw).has_state()) id(hx711_tare) = id(gas_hx711_raw).state;'
  - platform: template
    name: "btn_water_empty"
    id: btn_water_empty
    on_press:
      - lambda: 'if (id(water_distance).has_state()) id(water_empty_cm) = id(water_distance).state;'
  - platform: template
    name: "btn_water_full"
    id: btn_water_full
    on_press:
      - lambda: 'if (id(water_distance).has_state()) id(water_full_cm) = id(water_distance).state;'
  - platform: template
    name: "Isvalyti SMS istorija"
    id: btn_clear_sms
    on_press:
      - lambda: |-
          id(sms_1).publish_state("---");
          id(sms_2).publish_state("---");
          id(sms_3).publish_state("---");
          id(sms_4).publish_state("---");
          id(sms_5).publish_state("---");
  - platform: template
    name: "btn_force_send_google"
    id: btn_force_send_google
    on_press:
      - lambda: |-
          auto safe = [](float v) { return isnan(v) ? 0.0f : v; };
          std::string ts = id(gps_time_str);
          if (ts.length() != 19 || ts[4] != '-' || ts[7] != '-' || ts[10] != ' ' || ts[13] != ':' || ts[16] != ':') ts = "MANUAL";
          char row[320];
          snprintf(row, sizeof(row),
            "%s,,%.6f,%.6f,%.1f,%.1f,%.1f,%.0f,%.2f,%.2f,%.0f,%.0f,%.0f,%.1f,%.1f,%.1f,%.0f,%.1f,%.0f,%.0f,%.1f,%.0f;",
            ts.c_str(), safe(id(gps_lat)), safe(id(gps_lon)), safe(id(gps_alt)),
            safe(id(gps_speed)), safe(id(gps_heading)), safe(id(junc_soc).state),
            safe(id(junc_v).state), safe(id(junc_a).state), safe(id(water_level_pct).state),
            safe(id(tds_ppm).state), safe(id(gas_remaining_pct).state),
            safe(id(bme_temp).state), safe(id(bme_humidity).state), safe(id(bme_pressure).state),
            safe(id(bedroom_co2).state),
            safe(id(bedroom_temp).state), safe(id(bedroom_humidity).state),
            safe(id(junc_power).state), safe(id(junc_ah_remaining).state), (float)(millis() / 60000UL));
          if (id(data_batch).length() < 10000) {
            id(data_batch) += row;
            id(last_point_ms) = millis();
          }
      - script.execute: send_batch_to_google

switch:
  - platform: template
    name: "sw_google_upload"
    id: sw_google_upload
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    icon: "mdi:cloud-upload"
    turn_on_action:
      - globals.set: { id: google_upload_enabled, value: 'true' }
      - script.execute: send_batch_to_google
    turn_off_action:
      - globals.set: { id: google_upload_enabled, value: 'false' }

  - platform: template
    name: "sw_security_armed"
    id: sw_security_armed
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:shield-lock"
    turn_on_action:
      - logger.log: "🔒 Apsauga įjungta"
    turn_off_action:
