esphome:
  name: kempervanas
  friendly_name: Kempervanas
  on_boot:
    priority: 200
    then:
      - delay: 200ms
      - lambda: |-
          // ADXL345 pažadinimas ±16g režimu su 100Hz filtru
          uint8_t data_fmt[2] = {0x31, 0x0B};
          id(i2c_bus).write(0x53, data_fmt, 2, true);
          uint8_t bw_rate[2] = {0x2C, 0x0A};
          id(i2c_bus).write(0x53, bw_rate, 2, true);
          uint8_t pwr_ctl[2] = {0x2D, 0x08};
          id(i2c_bus).write(0x53, pwr_ctl, 2, true);
      - delay: 8s
      - lambda: 'id(a7670e_init).execute();'

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

wifi:
  ap:
    ssid: "Kemperis-Valdymas"
    password: "kemperis123"

web_server:
  port: 80
  version: 3
  local: true

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

i2c:
  - id: i2c_bus
    sda: GPIO9
    scl: GPIO10
    frequency: 100kHz
    scan: true

uart:
  - id: uart_a7670e
    tx_pin: GPIO40
    rx_pin: GPIO41
    baud_rate: 115200
    rx_buffer_size: 2048

esp32_ble_tracker:

ble_client:
  - mac_address: "38:3B:26:79:DB:64"
    id: junctek_shunt
    on_disconnect:
      then:
        - delay: 2s
        - ble_client.connect: junctek_shunt

