interval:
  # A7670E UART skaitymas (100ms) — GPS + GSM duomenys
  # Baitai nuskaityami iš RX buffer'io, eilutės separuojamos per \n
  - interval: 100ms
    then:
      - lambda: |-
          while (id(uart_a7670e).available()) {
            uint8_t b;
            id(uart_a7670e).read_byte(&b);
            char c = (char)b;
            id(uart_buf) += c;

            // Eilutės pabaiga — parsavimas
            if (c == '\n') {
              std::string line = id(uart_buf);
              id(uart_buf) = "";

              // ==================== SIM STATUSAS ====================
              if (line.find("+CPIN: READY") != std::string::npos) {
                id(sim_status) = "READY";
              }

              // ==================== GSM SIGNALAS (CSQ) ====================
              if (line.find("+CSQ:") != std::string::npos) {
                int pos = line.find(":");
                if (pos != -1) {
                  int csq = atoi(line.c_str() + pos + 1);
                  id(gsm_signal) = (csq >= 0 && csq <= 31) ? csq : 0;
                }
              }

              // ==================== GSM OPERATORIUS (COPS) ====================
              if (line.find("+COPS:") != std::string::npos) {
                size_t q1 = line.find('"');
                size_t q2 = (q1 != std::string::npos) ? line.find('"', q1+1) : std::string::npos;
                if (q1 != std::string::npos && q2 != std::string::npos) {
                  id(gsm_operator) = line.substr(q1+1, q2-q1-1);
                }
              }

              // ==================== GPS DUOMENYS (CGNSSINFO) ====================
              if (line.find("+CGNSSINFO:") != std::string::npos) {
                id(gps_error_count) = 0;

                // Skaidymas pagal kablelį
                std::vector<std::string> p;
                size_t s = line.find(":") + 1;
                size_t e = line.find(",", s);
                while (e != std::string::npos) {
                  p.push_back(line.substr(s, e - s));
                  s = e + 1;
                  e = line.find(",", s);
                }
                p.push_back(line.substr(s));

                if (p.size() >= 14) {
                  // p[0] = fix mode (0=nėra, 1=GPS, 2=2D, 3=3D, ...)
                  std::string fm_str = p[0];
                  while (!fm_str.empty() && (fm_str.front() == ' ' || fm_str.front() == '\t')) {
                    fm_str.erase(0, 1);
                  }
                  int fm = atoi(fm_str.c_str());
                  id(gps_fix_mode) = fm;

                  // Palydovų skaičius
                  id(gps_sats_gps)     = p[1].empty() ? 0 : atoi(p[1].c_str());
                  id(gps_sats_glonass) = p[2].empty() ? 0 : atoi(p[2].c_str());
                  id(gps_sats_bds)     = p[3].empty() ? 0 : atoi(p[3].c_str());
                  id(gps_sats_galileo) = p[4].empty() ? 0 : atoi(p[4].c_str());

                  // Koordinatės, aukštis, greitis, kryptis (jei 2D/3D fix)
                  if ((fm == 2 || fm == 3) && !p[5].empty()) {
                    // Platuma (S = neigiama)
                    float lat = atof(p[5].c_str());
                    if (p.size() > 6 && p[6] == "S") lat = -lat;
                    id(gps_lat) = lat;

                    // Ilguma (W = neigiama)
                    float lon = atof(p[7].c_str());
                    if (p.size() > 8 && p[8] == "W") lon = -lon;
                    id(gps_lon) = lon;

                    // Aukštis (m)
                    id(gps_alt) = p[11].empty() ? 0.0f : atof(p[11].c_str());

                    // Greitis (knot → km/h, koef. 1.852)
                    id(gps_speed) = p[12].empty() ? 0.0f : atof(p[12].c_str()) * 1.852f;

                    // Kryptis (°)
                    id(gps_heading) = p[13].empty() ? 0.0f : atof(p[13].c_str());

                    id(gps_fix) = true;
                  } else {
                    id(gps_fix) = false;
                  }
                }
              }

              // ==================== GPS KLAIDOS ATPAŽINIMAS ====================
              if (line.find("ERROR") != std::string::npos &&
                  line.find("+CMS ERROR") == std::string::npos &&
                  line.find("+CME ERROR") == std::string::npos) {
                id(gps_error_count) += 1;
              }

              // ==================== SMS GAVIMAS IR ATSAKYMAS ====================
              if (line.find("+CMT:") != std::string::npos) {
                // Siuntėjas: +CMT: "+37068123456"
                size_t q1 = line.find('"');
                size_t q2 = line.find('"', q1 + 1);
                if (q1 != std::string::npos && q2 != std::string::npos) {
                  id(sms_sender) = line.substr(q1 + 1, q2 - q1 - 1);
                  id(cmt_state) = 1;  // Laukiame kito eilutės (SMS kūnas)
                }
              } else if (id(cmt_state) == 1) {
                // SMS kūnas (antroji eilutė)
                id(cmt_state) = 0;
                std::string body = line;

                // Tarpų šalinti
                while (!body.empty() && (body.back() == '\r' || body.back() == '\n')) {
                  body.pop_back();
                }

                // Trigger check: "Status", "Info" arba "?"
                std::string low = body;
                for (auto &ch : low) ch = tolower(ch);
                bool trigger = (low.find("status") != std::string::npos) ||
                               (low.find("info") != std::string::npos) ||
                               (body == "?");

                if (trigger) {
                  // 30s throttle — nesiunti SMS per dažnai
                  unsigned long now = millis();
                  if (now - id(last_sms_send_ms) > 30000) {
                    id(last_sms_send_ms) = now;
                    id(sms_send_status).execute();
                  }
                }
              }
            }
          }

  # A7670E AT komandos — kas 10s (GPS + GSM statusas)
  # Seka: SIM status → Signalas → Operatorius → GPS duomenys
  # Bendra trukmė: ~4.5s (delays), tada laukimas iki 10s
  - interval: 10s
    then:
      - uart.write: { id: uart_a7670e, data: "AT+CPIN?\r\n" }
      - delay: 1500ms
      - uart.write: { id: uart_a7670e, data: "AT+CSQ\r\n" }
      - delay: 1500ms
      - uart.write: { id: uart_a7670e, data: "AT+COPS?\r\n" }
      - delay: 1500ms
      - uart.write: { id: uart_a7670e, data: "AT+CGNSSINFO\r\n" }

  # GPS error recovery — kas 30s
  # Jei gps_error_count > 3 → power cycle GPS per AT+CGNSSPWR
  # Timeout: 30s failai be fix → automatinis reset
  - interval: 30s
    then:
      - if:
          condition: { lambda: 'return id(gps_error_count) > 3;' }
          then:
            - script.execute: gps_recovery

  # BME680: Slėpio buffer atnaujinimas — kas 30 min (1800s)
  # Orų prognozė reikalinga 7 taškų per 3.5h, 30min intervalo
  # Tendencija skaičiuojama iš pirmo vs paskutinio taško
  - interval: 1800s
    then:
      - lambda: |-
          float p = id(bme_pressure).state;
          if (!isnan(p) && p > 850.0f && p < 1050.0f) {  // Validacijos check
            id(pressure_history).push_back(p);
            // Saugoti tik 7 paskutinius taškus (3.5 valandų istorija)
            if (id(pressure_history).size() > 7) {
              id(pressure_history).erase(id(pressure_history).begin());
            }
          }

script:
  # A7670E inicijalizacija — boot'e
  - id: a7670e_init
    then:
      # Modulio patikrinimas
      - uart.write: "AT\r\n"
      - delay: 1s
      # GPS aktyvavimas
      - uart.write: "AT+CGNSSPWR=1\r\n"
      - delay: 1s
      # SMS tekstinis režimas (PDU vietoj)
      - uart.write: "AT+CMGF=1\r\n"

  # GPS recovery — power cycle GPS per AT+CGNSSPWR
  # Vykdomas jei gps_error_count > 3 per 30s
  - id: gps_recovery
    mode: single  # Tik viena vykdymą iš karto
    then:
      - lambda: 'id(gps_error_count) = 0;'  # Nulinti error counter
      - uart.write: "AT+CGNSSPWR=0\r\n"  # GPS OFF
      - delay: 2s
      - uart.write: "AT+CGNSSPWR=1\r\n"  # GPS ON — power cycle

  # SMS status atsakymas — triggertas iš SMS gavimo
  # Atsakymas siunčiamas siuntėjui (id(sms_sender))
  - id: sms_send_status
    mode: queued  # Eilėje, jei daugiau nei vienas trigger
    then:
      # Žingsnis 1: SMS komanda su siuntėjo numeriu
      - uart.write:
          id: uart_a7670e
          data: !lambda |-
            std::string c = "AT+CMGS=\"" + id(sms_sender) + "\"\r\n";
            return std::vector<uint8_t>(c.begin(), c.end());
      - delay: 1500ms

      # Žingsnis 2: SMS kūnas (ASCII, max 160 char) + 0x1A (EOF)
      - uart.write:
          id: uart_a7670e
          data: !lambda |-
            // NaN safety: jei reikšmė nan, grąžinti 0
            auto f = [](float v) { return isnan(v) ? 0.0f : v; };

            char b[160];
            snprintf(b, sizeof(b),
              "Kemperis OK\n"
              "Loc:%.4f,%.4f\n"
              "Bat:%.1fV %.1fA\n"
              "Env:%dC %dhPa\n"
              "H2O:%d%% Gas:%d%%\x1A",
              id(gps_lat), id(gps_lon),
              f(id(junc_v).state), f(id(junc_a).state),
              (int)f(id(bme_temp).state), (int)f(id(bme_pressure).state),
              (int)f(id(water_level_pct).state), (int)f(id(gas_remaining_pct).state));

            return std::vector<uint8_t>(b, b + strlen(b));