# kempervanas_v11_BATTERY_ONLY.yaml
#
# Strategija: TIK BATERIJOS DEKODAVIMAS (Izoliavimo testas)
# Pašalinta: Viskas kas susiję su DC-DC (siekiant išvengti Bluetooth konfliktų)
# Pridėta: BMS_RAW loginimas, kad pamatytume tikslius baterijos paketus, kai ji pabus.

esphome:
  name: kempervanas
  friendly_name: Kempervanas
  on_boot:
    priority: 200
    then:
      - lambda: |-
          // ADXL345 measurement mode
          uint8_t data[2] = {0x2D, 0x08};
          id(i2c_bus).write(0x53, data, 2, true);
      - delay: 500ms
      - script.execute: a7670e_init

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

wifi:
  ap:
    ssid: "Kemperis-Valdymas"
    password: "kemperis123"

web_server:
  port: 80
  version: 2
  local: true

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG
  logs:
    "i2c.idf": WARN
    "esp32_ble": WARN
    component: WARN
    scheduler: WARN
    "esp-idf": WARN
    sensor: INFO
    text_sensor: INFO
    binary_sensor: INFO
    web_server: INFO
    wifi: INFO
    api: INFO
    esp32_ble_client: DEBUG
    ble_client: DEBUG

# ==========================================
# MAGISTRALĖS
# ==========================================
i2c:
  - id: i2c_bus
    sda: GPIO9
    scl: GPIO10
    scan: true
    frequency: 50kHz

uart:
  - id: uart_a7670e
    tx_pin: GPIO40
    rx_pin: GPIO41
    baud_rate: 115200
    rx_buffer_size: 1024
    debug:
      direction: BOTH
      dummy_receiver: false
      after:
        delimiter: "\r\n"
      sequence:
        - lambda: |-
            std::string s(bytes.begin(), bytes.end());
            ESP_LOGD("UART_DATA", "Simcom: %s", s.c_str());

# ==========================================
# PCF8574
# ==========================================
pcf8574:
  - id: pcf_out1
    address: 0x24
  - id: pcf_out2
    address: 0x25
  - id: pcf_in1
    address: 0x21
  - id: pcf_in2
    address: 0x22

# ==========================================
# GLOBALŪS KINTAMIEJI
# ==========================================
globals:
  # ADXL345 kalibracija
  - id: cal_roll
    type: float
    restore_value: true
    initial_value: '0.0'
  - id: cal_pitch
    type: float
    restore_value: true
    initial_value: '0.0'

  # GPS
  - id: gps_lat
    type: float
    initial_value: "0.0"
  - id: gps_lon
    type: float
    initial_value: "0.0"
  - id: gps_alt
    type: float
    initial_value: "0.0"
  - id: gps_speed
    type: float
    initial_value: "0.0"
  - id: gps_heading
    type: float
    initial_value: "0.0"
  - id: gps_sats
    type: int
    initial_value: "0"
  - id: gps_fix
    type: bool
    initial_value: "false"

  # GSM
  - id: uart_buf
    type: std::string
    initial_value: '""'
  - id: gsm_signal
    type: int
    initial_value: "0"
  - id: gsm_operator
    type: std::string
    initial_value: '"Ieskoma..."'
  - id: sim_status
    type: std::string
    initial_value: '"Tikrinama..."'

  # BMS Bufferis
  - id: bat_buffer
    type: std::vector<uint8_t>

# ==========================================
# BLUETOOTH — RENOGY TIK BATERIJA
# ==========================================
esp32_ble_tracker:

ble_client:
  - mac_address: "38:3B:26:79:DB:64"
    id: renogy_batt
    on_connect:
      then:
        - logger.log: "=== Renogy BATERIJA prijungta ==="
    on_disconnect:
      then:
        - logger.log: "Renogy Baterija atsijunge!"

# ==========================================
# MYGTUKAI IR KALIBRACIJA
# ==========================================
button:
  - platform: template
    name: "Pokrypis | Kalibruoti"
    id: calibrate_button
    on_press:
      - lambda: |-
          id(cal_roll) += id(roll_sensor).state;
          id(cal_pitch) += id(pitch_sensor).state;

# ==========================================
# SENSORIAI
# ==========================================
sensor:
  # === BMP180 ===
  - platform: bmp085
    temperature:
      name: "Aplinka | Temperatūra"
      id: bmp_temp
      filters:
        - offset: -2.0
      accuracy_decimals: 1
    pressure:
      name: "Aplinka | Slėgis"
      id: bmp_pressure
      accuracy_decimals: 1
    update_interval: 30s

  # === ADXL345 ===
  - platform: template
    name: "Pokrypis | Šoninis K-D"
    id: roll_sensor
    unit_of_measurement: "°"
    accuracy_decimals: 0
    update_interval: 1s
    lambda: |-
      uint8_t reg = 0x32;
      id(i2c_bus).write(0x53, &reg, 1, false);
      uint8_t raw[6];
      if (id(i2c_bus).read(0x53, raw, 6) != 0) return {};
      int16_t y = (int16_t)(raw[2] | (raw[3] << 8));
      int16_t z = (int16_t)(raw[4] | (raw[5] << 8));
      return (atan2((float)y * 0.004f, (float)z * 0.004f) * 180.0f / M_PI) - id(cal_roll);

  - platform: template
    name: "Pokrypis | Išilginis P-G"
    id: pitch_sensor
    unit_of_measurement: "°"
    accuracy_decimals: 0
    update_interval: 1s
    lambda: |-
      uint8_t reg = 0x32;
      id(i2c_bus).write(0x53, &reg, 1, false);
      uint8_t raw[6];
      if (id(i2c_bus).read(0x53, raw, 6) != 0) return {};
      int16_t x = (int16_t)(raw[0] | (raw[1] << 8));
      int16_t z = (int16_t)(raw[4] | (raw[5] << 8));
      return (atan2((float)x * 0.004f, (float)z * 0.004f) * 180.0f / M_PI) - id(cal_pitch);

  # === GPS ===
  - platform: template
    name: "GPS | Aukštis"
    id: gps_altitude
    unit_of_measurement: "m"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      if (!id(gps_fix)) return NAN;
      return id(gps_alt);

  - platform: template
    name: "GPS | Palydovai"
    id: gps_satellites
    accuracy_decimals: 0
    update_interval: 5s
    lambda: return (float)id(gps_sats);

  - platform: template
    name: "GPS | Greitis"
    id: gps_speed_sensor
    unit_of_measurement: "km/h"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      if (!id(gps_fix)) return NAN;
      return id(gps_speed);

  - platform: template
    name: "GPS | Kryptis"
    id: gps_heading_sensor
    unit_of_measurement: "°"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      if (!id(gps_fix)) return NAN;
      return id(gps_heading);

  # === GSM ===
  - platform: template
    name: "GSM | Signalas"
    id: gsm_signal_pct
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      if (id(gsm_signal) == 0 || id(gsm_signal) >= 99) return 0;
      float pct = (float)id(gsm_signal) / 31.0 * 100.0;
      return (pct > 100) ? 100 : pct;

  # === BATERIJA (BMS) ===
  - platform: template
    name: "Energija | Akum Įtampa"
    id: bat_volts
    unit_of_measurement: "V"
    accuracy_decimals: 2

  - platform: template
    name: "Energija | Akum Srovė"
    id: bat_amps
    unit_of_measurement: "A"
    accuracy_decimals: 2

  - platform: template
    name: "Energija | Akum SOC"
    id: bat_soc
    unit_of_measurement: "%"
    accuracy_decimals: 0

  - platform: template
    name: "Energija | Akum Celė 1"
    id: bat_cell_1
    unit_of_measurement: "V"
    accuracy_decimals: 3

  - platform: template
    name: "Energija | Akum Celė 2"
    id: bat_cell_2
    unit_of_measurement: "V"
    accuracy_decimals: 3

  - platform: template
    name: "Energija | Akum Celė 3"
    id: bat_cell_3
    unit_of_measurement: "V"
    accuracy_decimals: 3

  - platform: template
    name: "Energija | Akum Celė 4"
    id: bat_cell_4
    unit_of_measurement: "V"
    accuracy_decimals: 3

# ==========================================
# TEKSTINIAI SENSORIAI
# ==========================================
text_sensor:
  - platform: template
    name: "GSM | SIM Statusas"
    id: sim_status_sensor
    update_interval: 10s
    lambda: return id(sim_status);

  - platform: template
    name: "GSM | Operatorius"
    id: gsm_operator_sensor
    update_interval: 10s
    lambda: |-
      if (id(gsm_operator) == "24602") return std::string("Tele2");
      if (id(gsm_operator) == "24601") return std::string("Telia");
      if (id(gsm_operator) == "24603") return std::string("Bite");
      return id(gsm_operator);

  - platform: template
    name: "GPS | Koordinatės"
    id: gps_coords
    update_interval: 5s
    lambda: |-
      if (id(gps_fix)) {
        char buf[64];
        snprintf(buf, sizeof(buf), "%.6f, %.6f", id(gps_lat), id(gps_lon));
        return std::string(buf);
      }
      return std::string("Ieškoma palydovų...");

  # === BMS DEKODAVIMAS ===
  - platform: ble_client
    ble_client_id: renogy_batt
    name: "Energija | Akum Raw HEX"
    id: bat_assembled_hex
    service_uuid: "FFF0"
    characteristic_uuid: "FFF1"
    notify: true
    update_interval: 24h
    on_notify:
      - lambda: |-
          for (uint8_t b : x) {
            if (b == 0xBB) id(bat_buffer).clear();
            id(bat_buffer).push_back(b);

            if (b == 0xEE && id(bat_buffer).size() > 5) {
              int size = id(bat_buffer).size();
              std::string hex;
              for (uint8_t buf_b : id(bat_buffer)) {
                char str[4];
                snprintf(str, sizeof(str), "%02X", buf_b);
                hex += str;
              }
              id(bat_assembled_hex).publish_state(hex);
              
              // VISADA ATSPAUSDINAME PILNĄ KADRĄ LOG'E (kad matytume srovės šuolius)
              ESP_LOGI("BMS_RAW", "Gautas pilnas HEX [%d B]: %s", size, hex.c_str());

              // TIPO: BB 14 (Įtampa + Srovė)
              if (size >= 4 && id(bat_buffer)[0] == 0xBB && id(bat_buffer)[1] == 0x14) {
                // Įtampa
                uint8_t v1_byte = id(bat_buffer)[2];
                uint8_t v2_byte = id(bat_buffer)[3];
                float volts = ((v1_byte >> 4) * 10.0f + (v1_byte & 0x0F)) +
                              ((v2_byte >> 4) * 0.1f) + ((v2_byte & 0x0F) * 0.01f);
                id(bat_volts).publish_state(volts);

                // Srovė
                int c_idx = -1;
                for (size_t i = 4; i < size - 1; i++) {
                  if ((id(bat_buffer)[i] == 0xC0 || id(bat_buffer)[i] == 0xC1) &&
                      id(bat_buffer)[i+1] < 0xA0) {
                    c_idx = i;
                    break;
                  }
                }

                if (c_idx != -1 && c_idx + 1 < size - 1) {
                  uint8_t amp_byte1 = id(bat_buffer)[c_idx + 1];
                  uint8_t amp_byte2 = (c_idx + 2 < size - 1) ? id(bat_buffer)[c_idx + 2] : 0x00;
                  float amps = ((amp_byte1 >> 4) * 10.0f + (amp_byte1 & 0x0F)) +
                               ((amp_byte2 >> 4) * 0.1f) + ((amp_byte2 & 0x0F) * 0.01f);
                  if (id(bat_buffer)[c_idx] == 0xC0) amps = -amps;
                  if (amps >= -200.0f && amps <= 200.0f) {
                    id(bat_amps).publish_state(amps);
                  }
                }
              }

              // TIPO: D2/D3 (Ląstelės)
              for (size_t i = 1; i < size - 2; i++) {
                if (id(bat_buffer)[i] == 0xD2 || id(bat_buffer)[i] == 0xD3) {
                  if (i + 2 < size - 1) {
                    uint8_t c_byte1 = id(bat_buffer)[i + 1];
                    uint8_t c_byte2 = id(bat_buffer)[i + 2];
                    float cell_v = ((c_byte1 >> 4) * 1.0f) + ((c_byte1 & 0x0F) * 0.1f) +
                                   ((c_byte2 >> 4) * 0.01f) + ((c_byte2 & 0x0F) * 0.001f);
                    if (cell_v > 2.5f && cell_v < 3.8f) {
                      if (id(bat_buffer)[i] == 0xD2) {
                        id(bat_cell_1).publish_state(cell_v);
                        id(bat_cell_2).publish_state(cell_v);
                      } else {
                        id(bat_cell_3).publish_state(cell_v);
                        id(bat_cell_4).publish_state(cell_v);
                      }
                    }
                  }
                }
              }

              // TIPO: SOC
              for (size_t i = 1; i < size - 1; i++) {
                if (id(bat_buffer)[i] == 0x20 && i + 1 < size - 1) {
                  uint8_t soc_byte = id(bat_buffer)[i + 1];
                  float soc = ((soc_byte >> 4) * 10.0f) + (soc_byte & 0x0F);
                  if (soc >= 0.0f && soc <= 100.0f) {
                    id(bat_soc).publish_state(soc);
                  }
                  break;
                }
              }

              id(bat_buffer).clear();
            }
          }
          if (id(bat_buffer).size() > 150) id(bat_buffer).clear();

# ==========================================
# INTERVALAI
# ==========================================
interval:
  - interval: 100ms
    then:
      - lambda: |-
          while (id(uart_a7670e).available()) {
            uint8_t byte;
            id(uart_a7670e).read_byte(&byte);
            char c = (char)byte;
            id(uart_buf) += c;
            if (c == '\n') {
              std::string line = id(uart_buf);
              id(uart_buf) = "";

              if (line.find("+CPIN: READY") != std::string::npos) {
                id(sim_status) = "READY";
              }

              if (line.find("+CGNSSINFO:") != std::string::npos) {
                std::vector<std::string> p;
                size_t start = line.find(":") + 1;
                size_t end = line.find(",", start);
                while (end != std::string::npos) {
                  p.push_back(line.substr(start, end - start));
                  start = end + 1;
                  end = line.find(",", start);
                }
                p.push_back(line.substr(start));

                std::string fix_mode = p[0];
                while (!fix_mode.empty() && (fix_mode.front() == ' ' || fix_mode.front() == '\t')) {
                  fix_mode.erase(0, 1);
                }

                if ((fix_mode == "2" || fix_mode == "3") && p.size() > 12
                    && !p[5].empty() && !p[7].empty()) {
                  float lat = atof(p[5].c_str());
                  if (p[6] == "S") lat = -lat;
                  float lon = atof(p[7].c_str());
                  if (p[8] == "W") lon = -lon;
                  float alt = atof(p[11].c_str());
                  float speed = (p[9].empty()) ? 0 : atof(p[9].c_str());
                  float heading = (p[10].empty()) ? 0 : atof(p[10].c_str());

                  id(gps_lat) = lat;
                  id(gps_lon) = lon;
                  id(gps_alt) = alt;
                  id(gps_speed) = speed;
                  id(gps_heading) = heading;
                  id(gps_fix) = true;

                  int sats = 0;
                  if (!p[1].empty()) sats += atoi(p[1].c_str());
                  if (!p[2].empty()) sats += atoi(p[2].c_str());
                  if (!p[3].empty()) sats += atoi(p[3].c_str());
                  if (!p[4].empty()) sats += atoi(p[4].c_str());
                  id(gps_sats) = sats;
                } else {
                  id(gps_fix) = false;
                }
              }

              if (line.find("+CSQ:") != std::string::npos) {
                size_t pos = line.find(":") + 1;
                id(gsm_signal) = atoi(line.c_str() + pos);
              }

              if (line.find("+COPS:") != std::string::npos) {
                size_t q1 = line.find('"');
                size_t q2 = (q1 != std::string::npos) ? line.find('"', q1+1) : std::string::npos;
                if (q1 != std::string::npos && q2 != std::string::npos) {
                  id(gsm_operator) = line.substr(q1+1, q2-q1-1);
                }
              }
            }
          }

  - interval: 10s
    then:
      - uart.write: { id: uart_a7670e, data: "AT+CPIN?\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+CSQ\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+COPS?\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+CGNSSINFO\r\n" }

# ==========================================
# SKRIPTAI
# ==========================================
script:
  - id: a7670e_init
    then:
      - uart.write: { id: uart_a7670e, data: "AT\r\n" }
      - delay: 1s
      - uart.write: { id: uart_a7670e, data: "AT+CGNSSPWR=1\r\n" }
      - delay: 1s
      - logger.log: "A7670E inicializuotas"