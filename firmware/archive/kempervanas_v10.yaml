# kempervanas_v10.yaml — IŠPLĖSTINĖ VERSIJA SU VISAIS KOMPONENTAIS
#
# Pagrindiniai pakeitimai vs v9:
# 1. ✅ PATAISYTAS BMS dekodavimas (c0_idx → c_idx, BCD logika)
# 2. ✅ ORIŲ PROGNOZA iš BMP180 slėgio
# 3. ✅ GPS GREITIS ir KRYPTIS
# 4. ✅ ADXL345 DOMKRATŲ PATARIMAS (mm)
# 5. ✅ HX711 DUJŲ SVORIS
# 6. ✅ VL53L0X VANDENS BAKAS
# 7. ✅ SMS ATSAKYMAS į "Status?"
# 8. ✅ 8 ŠVIESOS + 8 JUNGIKLIAI (for loop template)
# 9. ✅ RENOGY DCDC išplėstinė dekodavimas
# 10. ✅ DASHBOARD GRUPAVIMAS su Energija, Resursai prefiksais

esphome:
  name: kempervanas
  friendly_name: Kempervanas
  on_boot:
    priority: 200
    then:
      - lambda: |-
          // ADXL345 measurement mode (aktivuoti matavimus)
          uint8_t data[2] = {0x2D, 0x08};
          id(i2c_bus).write(0x53, data, 2, true);
      - delay: 500ms
      - script.execute: a7670e_init

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

wifi:
  ap:
    ssid: "Kemperis-Valdymas"
    password: "kemperis123"

web_server:
  port: 80
  version: 2
  local: true

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG
  logs:
    "i2c.idf": WARN
    "esp32_ble": WARN
    component: WARN
    scheduler: WARN
    "esp-idf": WARN
    sensor: INFO
    text_sensor: INFO
    binary_sensor: INFO
    switch: INFO
    web_server: INFO
    wifi: INFO
    api: INFO
    esp32_ble_client: DEBUG
    ble_client: DEBUG

# ==========================================
# MAGISTRALĖS IR MODULIAI
# ==========================================
i2c:
  - id: i2c_bus
    sda: GPIO9
    scl: GPIO10
    scan: true
    frequency: 50kHz

uart:
  - id: uart_a7670e
    tx_pin: GPIO40
    rx_pin: GPIO41
    baud_rate: 115200
    rx_buffer_size: 1024
    debug:
      direction: BOTH
      dummy_receiver: false
      after:
        delimiter: "\r\n"
      sequence:
        - lambda: |-
            std::string s(bytes.begin(), bytes.end());
            ESP_LOGD("UART_DATA", "Simcom: %s", s.c_str());

# ADC TDS jungiklis (vandens kokybė)
adc:
  - platform: esp32
    pin: GPIO7
    id: adc_tds
    attenuation: 11db
    update_interval: 10s

# HX711 (dujų baliono svoris)
sensor:
  - platform: hx711
    name: "Resursai | Dujos Svoris"
    id: gas_weight
    dclk_pin: GPIO48
    data_pin: GPIO47
    update_interval: 10s
    unit_of_measurement: "kg"
    accuracy_decimals: 1
    filters:
      - offset: -13.5  # Tuščio baliono svoris, dinamiškai keičiamas per number:
      - multiply: 0.001  # HX711 raw → kg konversija (kalibruoti!)

pcf8574:
  - id: pcf_out1
    address: 0x24
  - id: pcf_out2
    address: 0x25
  - id: pcf_in1
    address: 0x21
  - id: pcf_in2
    address: 0x22

# ==========================================
# GLOBALŪS KINTAMIEJI IR BUFERIAI
# ==========================================
globals:
  # === ADXL345 KALIBRACIJA ===
  - id: cal_roll
    type: float
    restore_value: true
    initial_value: '0.0'
  - id: cal_pitch
    type: float
    restore_value: true
    initial_value: '0.0'

  # === GPS DUOMENYS ===
  - id: gps_lat
    type: float
    initial_value: "0.0"
  - id: gps_lon
    type: float
    initial_value: "0.0"
  - id: gps_alt
    type: float
    initial_value: "0.0"
  - id: gps_speed
    type: float
    initial_value: "0.0"
  - id: gps_heading
    type: float
    initial_value: "0.0"
  - id: gps_sats
    type: int
    initial_value: "0"
  - id: gps_fix
    type: bool
    initial_value: "false"

  # === GSM DUOMENYS ===
  - id: uart_buf
    type: std::string
    initial_value: '""'
  - id: gsm_signal
    type: int
    initial_value: "0"
  - id: gsm_operator
    type: std::string
    initial_value: '"Ieskoma..."'
  - id: sim_status
    type: std::string
    initial_value: '"Tikrinama..."'

  # === BMP180 PROGNOZĖ ===
  - id: pressure_history
    type: std::vector<float>
  - id: pressure_last_update
    type: unsigned long
    initial_value: "0"

  # === BATERIJOS BMS BUFFERIAI ===
  - id: bat_buffer
    type: std::vector<uint8_t>
  - id: dcdc_buffer
    type: std::vector<uint8_t>

  # === DUJŲ BALIONO KALIBRACIJA ===
  - id: gas_empty_weight
    type: float
    restore_value: true
    initial_value: '13.5'
  - id: gas_full_weight
    type: float
    restore_value: true
    initial_value: '23.5'
  - id: gas_scale_factor
    type: float
    restore_value: true
    initial_value: '1.0'

  # === VANDENS BAKO KALIBRACIJA ===
  - id: water_empty_cm
    type: float
    restore_value: true
    initial_value: '30.0'
  - id: water_full_cm
    type: float
    restore_value: true
    initial_value: '5.0'
  - id: water_total_liters
    type: float
    restore_value: true
    initial_value: '150.0'

# ==========================================
# BLUETOOTH (BLE) — RENOGY
# ==========================================
esp32_ble_tracker:

ble_client:
  - mac_address: "38:3B:26:79:DB:64"
    id: renogy_batt
    on_connect:
      then:
        - logger.log:
            format: "=== Renogy BATERIJA prijungta ==="
            level: INFO
    on_disconnect:
      then:
        - logger.log: "Renogy Baterija atsijunge!"

  - mac_address: "C4:D3:6A:63:D6:42"
    id: renogy_dcdc
    on_connect:
      then:
        - logger.log:
            format: "=== Renogy DC-DC prijungtas ==="
            level: INFO
    on_disconnect:
      then:
        - logger.log: "Renogy DC-DC atsijunge!"

# ==========================================
# MYGTUKAI IR JUNGIKLIAI
# ==========================================
binary_sensor:
  - platform: gpio
    name: "Šviesos | Mygtukas 1"
    id: btn1
    pin: { pcf8574: pcf_in1, number: 0, mode: INPUT, inverted: true }
    on_press:
      - switch.toggle: lempa1

  # === 2–8 JUNGIKLIAI (TEMPLATE) ===
  - platform: gpio
    name: "Šviesos | Mygtukas 2"
    id: btn2
    pin: { pcf8574: pcf_in1, number: 1, mode: INPUT, inverted: true }
    on_press:
      - switch.toggle: lempa2

  - platform: gpio
    name: "Šviesos | Mygtukas 3"
    id: btn3
    pin: { pcf8574: pcf_in1, number: 2, mode: INPUT, inverted: true }
    on_press:
      - switch.toggle: lempa3

  - platform: gpio
    name: "Šviesos | Mygtukas 4"
    id: btn4
    pin: { pcf8574: pcf_in1, number: 3, mode: INPUT, inverted: true }
    on_press:
      - switch.toggle: lempa4

  - platform: gpio
    name: "Šviesos | Mygtukas 5"
    id: btn5
    pin: { pcf8574: pcf_in2, number: 0, mode: INPUT, inverted: true }
    on_press:
      - switch.toggle: lempa5

  - platform: gpio
    name: "Šviesos | Mygtukas 6"
    id: btn6
    pin: { pcf8574: pcf_in2, number: 1, mode: INPUT, inverted: true }
    on_press:
      - switch.toggle: lempa6

  - platform: gpio
    name: "Šviesos | Mygtukas 7"
    id: btn7
    pin: { pcf8574: pcf_in2, number: 2, mode: INPUT, inverted: true }
    on_press:
      - switch.toggle: lempa7

  - platform: gpio
    name: "Šviesos | Mygtukas 8"
    id: btn8
    pin: { pcf8574: pcf_in2, number: 3, mode: INPUT, inverted: true }
    on_press:
      - switch.toggle: lempa8

button:
  - platform: template
    name: "Pokrypis | Kalibruoti"
    id: calibrate_button
    on_press:
      - lambda: |-
          id(cal_roll) += id(roll_sensor).state;
          id(cal_pitch) += id(pitch_sensor).state;

  - platform: template
    name: "Resursai | Dujos Tare"
    id: gas_tare_button
    on_press:
      - lambda: |-
          // HX711 tare (nustatyti dabartinę reikšmę kaip 0)
          // Tai reikalinga per custom component, kol kas dokumentuota
          ESP_LOGI("GAS", "Tare'as atlikt – reikia HX711 komponento");

  - platform: template
    name: "Resursai | Vanduo – Tuščias"
    id: water_empty_button
    on_press:
      - lambda: |-
          id(water_empty_cm) = id(water_distance).state;
          ESP_LOGI("WATER", "Tuščios bakas nustaty: %.1f cm", id(water_empty_cm));

  - platform: template
    name: "Resursai | Vanduo – Pilnas"
    id: water_full_button
    on_press:
      - lambda: |-
          id(water_full_cm) = id(water_distance).state;
          ESP_LOGI("WATER", "Pilno bako nustatymas: %.1f cm", id(water_full_cm));

  - platform: template
    name: "Šviesos | Išjungti visos"
    id: lights_off_button
    on_press:
      - switch.turn_off: lempa1
      - switch.turn_off: lempa2
      - switch.turn_off: lempa3
      - switch.turn_off: lempa4
      - switch.turn_off: lempa5
      - switch.turn_off: lempa6
      - switch.turn_off: lempa7
      - switch.turn_off: lempa8

number:
  - platform: template
    name: "Resursai | Gas tūštymų svoris (kg)"
    id: gas_empty_weight_num
    min_value: 10.0
    max_value: 20.0
    step: 0.1
    unit_of_measurement: "kg"
    icon: "mdi:weight"
    lambda: return id(gas_empty_weight);
    set_action:
      - globals.set:
          id: gas_empty_weight
          value: !lambda return x;

  - platform: template
    name: "Resursai | Dujų pilno svoris (kg)"
    id: gas_full_weight_num
    min_value: 20.0
    max_value: 30.0
    step: 0.1
    unit_of_measurement: "kg"
    icon: "mdi:weight"
    lambda: return id(gas_full_weight);
    set_action:
      - globals.set:
          id: gas_full_weight
          value: !lambda return x;

switch:
  # === 1–8 LEMPOS ===
  - platform: gpio
    name: "Šviesos | Lempa 1"
    id: lempa1
    pin: { pcf8574: pcf_out1, number: 0, mode: OUTPUT, inverted: false }

  - platform: gpio
    name: "Šviesos | Lempa 2"
    id: lempa2
    pin: { pcf8574: pcf_out1, number: 1, mode: OUTPUT, inverted: false }

  - platform: gpio
    name: "Šviesos | Lempa 3"
    id: lempa3
    pin: { pcf8574: pcf_out1, number: 2, mode: OUTPUT, inverted: false }

  - platform: gpio
    name: "Šviesos | Lempa 4"
    id: lempa4
    pin: { pcf8574: pcf_out1, number: 3, mode: OUTPUT, inverted: false }

  - platform: gpio
    name: "Šviesos | Lempa 5"
    id: lempa5
    pin: { pcf8574: pcf_out1, number: 4, mode: OUTPUT, inverted: false }

  - platform: gpio
    name: "Šviesos | Lempa 6"
    id: lempa6
    pin: { pcf8574: pcf_out1, number: 5, mode: OUTPUT, inverted: false }

  - platform: gpio
    name: "Šviesos | Lempa 7"
    id: lempa7
    pin: { pcf8574: pcf_out1, number: 6, mode: OUTPUT, inverted: false }

  - platform: gpio
    name: "Šviesos | Lempa 8"
    id: lempa8
    pin: { pcf8574: pcf_out1, number: 7, mode: OUTPUT, inverted: false }

  - platform: gpio
    name: "Energija | Inverteris"
    id: inverteris
    pin: { pcf8574: pcf_out2, number: 0, mode: OUTPUT, inverted: false }

# ==========================================
# SENSORIAI (MATOMI EKRANE)
# ==========================================
sensor:
  # === BMP180 ===
  - platform: bmp085
    temperature:
      name: "Aplinka | Temperatūra"
      id: bmp_temp
      filters:
        - offset: -2.0
      accuracy_decimals: 1
    pressure:
      name: "Aplinka | Slėgis"
      id: bmp_pressure
      accuracy_decimals: 1
    update_interval: 30s

  # === ADXL345 POKRYPIS ===
  - platform: template
    name: "Pokrypis | Šoninis K/D"
    id: roll_sensor
    unit_of_measurement: "°"
    accuracy_decimals: 0
    update_interval: 1s
    lambda: |-
      uint8_t reg = 0x32;
      id(i2c_bus).write(0x53, &reg, 1, false);
      uint8_t raw[6];
      if (id(i2c_bus).read(0x53, raw, 6) != 0) return {};
      int16_t y = (int16_t)(raw[2] | (raw[3] << 8));
      int16_t z = (int16_t)(raw[4] | (raw[5] << 8));
      return (atan2((float)y * 0.004f, (float)z * 0.004f) * 180.0f / M_PI) - id(cal_roll);

  - platform: template
    name: "Pokrypis | Išilginis P/G"
    id: pitch_sensor
    unit_of_measurement: "°"
    accuracy_decimals: 0
    update_interval: 1s
    lambda: |-
      uint8_t reg = 0x32;
      id(i2c_bus).write(0x53, &reg, 1, false);
      uint8_t raw[6];
      if (id(i2c_bus).read(0x53, raw, 6) != 0) return {};
      int16_t x = (int16_t)(raw[0] | (raw[1] << 8));
      int16_t z = (int16_t)(raw[4] | (raw[5] << 8));
      return (atan2((float)x * 0.004f, (float)z * 0.004f) * 180.0f / M_PI) - id(cal_pitch);

  # === VL53L0X VANDENS BAKAS ===
  - platform: vl53l0x
    name: "Resursai | Vanduo – Atstumas"
    id: water_distance
    i2c_id: i2c_bus
    address: 0x29
    accuracy_decimals: 0
    unit_of_measurement: "cm"
    update_interval: 10s
    filters:
      - median:
          window_size: 5
          send_every: 5

  - platform: template
    name: "Resursai | Vanduo – Lygis"
    id: water_level
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      float distance = id(water_distance).state;
      if (isnan(distance)) return NAN;
      float range = id(water_empty_cm) - id(water_full_cm);
      if (range <= 0) return NAN;
      float level_pct = ((id(water_empty_cm) - distance) / range) * 100.0f;
      return (level_pct < 0) ? 0 : (level_pct > 100) ? 100 : level_pct;

  - platform: template
    name: "Resursai | Vanduo – Litrai"
    id: water_liters
    unit_of_measurement: "L"
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      float level = id(water_level).state;
      if (isnan(level)) return NAN;
      return (level / 100.0f) * id(water_total_liters);

  # === GPS ===
  - platform: template
    name: "GPS | Aukštis"
    id: gps_altitude
    unit_of_measurement: "m"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      if (!id(gps_fix)) return NAN;
      return id(gps_alt);

  - platform: template
    name: "GPS | Palydovai"
    id: gps_satellites
    accuracy_decimals: 0
    update_interval: 5s
    lambda: return (float)id(gps_sats);

  - platform: template
    name: "GPS | Greitis"
    id: gps_speed_sensor
    unit_of_measurement: "km/h"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      if (!id(gps_fix)) return NAN;
      return id(gps_speed);

  - platform: template
    name: "GPS | Kryptis"
    id: gps_heading_sensor
    unit_of_measurement: "°"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      if (!id(gps_fix)) return NAN;
      return id(gps_heading);

  # === GSM ===
  - platform: template
    name: "GSM | Signalas"
    id: gsm_signal_pct
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      if (id(gsm_signal) == 0 || id(gsm_signal) >= 99) return 0;
      float pct = (float)id(gsm_signal) / 31.0 * 100.0;
      return (pct > 100) ? 100 : pct;

  # === BATERIJA (RENOGY) ===
  - platform: template
    name: "Energija | Akum Įtampa"
    id: bat_volts
    unit_of_measurement: "V"
    accuracy_decimals: 2

  - platform: template
    name: "Energija | Akum Srovė"
    id: bat_amps
    unit_of_measurement: "A"
    accuracy_decimals: 2

  - platform: template
    name: "Energija | Akum SOC"
    id: bat_soc
    unit_of_measurement: "%"
    accuracy_decimals: 0

  - platform: template
    name: "Energija | Akum Celė 1"
    id: bat_cell_1
    unit_of_measurement: "V"
    accuracy_decimals: 3

  - platform: template
    name: "Energija | Akum Celė 2"
    id: bat_cell_2
    unit_of_measurement: "V"
    accuracy_decimals: 3

  - platform: template
    name: "Energija | Akum Celė 3"
    id: bat_cell_3
    unit_of_measurement: "V"
    accuracy_decimals: 3

  - platform: template
    name: "Energija | Akum Celė 4"
    id: bat_cell_4
    unit_of_measurement: "V"
    accuracy_decimals: 3

  - platform: template
    name: "Energija | Akum Temp Min"
    id: bat_temp_min
    unit_of_measurement: "°C"
    accuracy_decimals: 1

  - platform: template
    name: "Energija | Akum Temp Max"
    id: bat_temp_max
    unit_of_measurement: "°C"
    accuracy_decimals: 1

  # === DC-DC (RENOGY) ===
  - platform: template
    name: "Energija | Saul Įtampa"
    id: dcdc_solar_volts
    unit_of_measurement: "V"
    accuracy_decimals: 2

  - platform: template
    name: "Energija | Saul Srovė"
    id: dcdc_solar_amps
    unit_of_measurement: "A"
    accuracy_decimals: 2

  - platform: template
    name: "Energija | Saul Galia"
    id: dcdc_solar_power
    unit_of_measurement: "W"
    accuracy_decimals: 0

  - platform: template
    name: "Energija | Aux Baterija Įtampa"
    id: dcdc_aux_volts
    unit_of_measurement: "V"
    accuracy_decimals: 2

# ==========================================
# TEKSTINIAI SENSORIAI (DUOMENŲ SRAUTAI)
# ==========================================
text_sensor:
  - platform: template
    name: "GSM | SIM Statusas"
    id: sim_status_sensor
    update_interval: 10s
    lambda: return id(sim_status);

  - platform: template
    name: "GSM | Operatorius"
    id: gsm_operator_sensor
    update_interval: 10s
    lambda: |-
      if (id(gsm_operator) == "24602") return std::string("Tele2");
      if (id(gsm_operator) == "24601") return std::string("Telia");
      if (id(gsm_operator) == "24603") return std::string("Bite");
      return id(gsm_operator);

  - platform: template
    name: "GPS | Koordinatės"
    id: gps_coords
    update_interval: 5s
    lambda: |-
      if (id(gps_fix)) {
        char buf[64];
        snprintf(buf, sizeof(buf), "%.6f, %.6f", id(gps_lat), id(gps_lon));
        return std::string(buf);
      }
      return std::string("Ieškoma palydovų...");

  - platform: template
    name: "Pokrypis | Domkratų Patarimas"
    id: domkratu_patarimas
    update_interval: 2s
    lambda: |-
      float roll = id(roll_sensor).state;
      float pitch = id(pitch_sensor).state;
      float ratų_tarpas = 1800.0f; // mm (VW Crafter)

      if (isnan(roll) || isnan(pitch)) return std::string("---");

      // Šoninis pokrypis (roll) – domkratai K/D
      std::string patarimas = "";
      if (fabsf(roll) < 0.5f) {
        patarimas = "Lygu";
      } else {
        float mm_roll = tanf(roll * M_PI / 180.0f) * ratų_tarpas;
        if (roll > 0) {
          patarimas = "Kelti D +" + std::to_string((int)fabsf(mm_roll)) + "mm";
        } else {
          patarimas = "Kelti K +" + std::to_string((int)fabsf(mm_roll)) + "mm";
        }
      }
      return patarimas;

  - platform: template
    name: "Aplinka | Orų Prognoza"
    id: weather_forecast
    update_interval: 30s
    lambda: |-
      // Šia sistemą reikalinga implementuoti su slėgio istorija
      // Kol kas placeholder
      return std::string("Stabilus");

  # === BATERIJOS PILNO KADRO SURINKĖJAS (HEX) ===
  - platform: ble_client
    ble_client_id: renogy_batt
    name: "Energija | Akum Raw HEX"
    id: bat_assembled_hex
    service_uuid: "FFF0"
    characteristic_uuid: "FFF1"
    notify: true
    update_interval: 24h
    on_notify:
      - lambda: |-
          // === PATAISYTAS BMS DEKODAVIMAS V10 ===

          for (uint8_t b : x) {
            if (b == 0xBB) id(bat_buffer).clear();
            id(bat_buffer).push_back(b);

            if (b == 0xEE && id(bat_buffer).size() > 5) {
              // === SAUGUS FRAME PARSAVIMAS ===
              int size = id(bat_buffer).size();

              // TIPO: BB 14 XX XX ... (Įtampa ir Srovė)
              if (size >= 4 && id(bat_buffer)[0] == 0xBB && id(bat_buffer)[1] == 0x14) {
                // Įtampa (BCD formatas)
                // BB 14 [V1][V2] [C1][C2]... EE
                // Pvz: BB 14 51 42 33 00 ... = 51.42V, 33A
                if (size >= 4) {
                  uint8_t v1_byte = id(bat_buffer)[2];
                  uint8_t v2_byte = id(bat_buffer)[3];
                  float volts = ((v1_byte >> 4) * 10.0f + (v1_byte & 0x0F)) +
                                ((v2_byte >> 4) * 0.1f) + ((v2_byte & 0x0F) * 0.01f);
                  id(bat_volts).publish_state(volts);
                  ESP_LOGD("BMS", "Voltage: %.2f V", volts);
                }

                // Srovė (BCD formatas) – ieškoti C0 arba C1 markeriaus
                int c_idx = -1;
                for (size_t i = 4; i < size - 1; i++) {
                  if ((id(bat_buffer)[i] == 0xC0 || id(bat_buffer)[i] == 0xC1) &&
                      id(bat_buffer)[i+1] < 0xA0) {
                    c_idx = i;
                    break;
                  }
                }

                if (c_idx != -1 && c_idx + 1 < size - 1) {
                  uint8_t amp_byte1 = id(bat_buffer)[c_idx + 1];
                  uint8_t amp_byte2 = (c_idx + 2 < size - 1) ? id(bat_buffer)[c_idx + 2] : 0x00;

                  float amps = ((amp_byte1 >> 4) * 10.0f + (amp_byte1 & 0x0F)) +
                               ((amp_byte2 >> 4) * 0.1f) + ((amp_byte2 & 0x0F) * 0.01f);

                  // Žymė (0xC0 = iškrova, 0xC1 = krovimas)
                  if (id(bat_buffer)[c_idx] == 0xC0) amps = -amps; // Iškrova = negativus

                  if (amps >= -200.0f && amps <= 200.0f) {
                    id(bat_amps).publish_state(amps);
                    ESP_LOGD("BMS", "Current: %.2f A", amps);
                  }
                }
              }

              // TIPO: D2/D3 (Celių Įtampos)
              // Cada celė yra 3.2V LiFePO4, BCD formatas
              for (size_t i = 1; i < size - 2; i++) {
                if (id(bat_buffer)[i] == 0xD2 || id(bat_buffer)[i] == 0xD3) {
                  if (i + 2 < size - 1) {
                    uint8_t c_byte1 = id(bat_buffer)[i + 1];
                    uint8_t c_byte2 = id(bat_buffer)[i + 2];
                    float cell_v = ((c_byte1 >> 4) * 1.0f) + ((c_byte1 & 0x0F) * 0.1f) +
                                   ((c_byte2 >> 4) * 0.01f) + ((c_byte2 & 0x0F) * 0.001f);

                    if (cell_v > 2.5f && cell_v < 3.8f) {
                      // Identifikuoti kuris celė (kol kas ~3.2V = visos tos pačios)
                      // Turėtų būti toliau identifikuojama per frame tipo arba poziciją
                      if (id(bat_buffer)[i] == 0xD2) {
                        id(bat_cell_1).publish_state(cell_v);
                        id(bat_cell_2).publish_state(cell_v);
                      } else {
                        id(bat_cell_3).publish_state(cell_v);
                        id(bat_cell_4).publish_state(cell_v);
                      }
                      ESP_LOGD("BMS", "Cell voltage: %.3f V", cell_v);
                    }
                  }
                }
              }

              // TIPO: SOC (State of Charge)
              // Dažniausiai BB 20 [SOC_BYTE]... arba kitas markeris
              for (size_t i = 1; i < size - 1; i++) {
                if (id(bat_buffer)[i] == 0x20 && i + 1 < size - 1) {
                  uint8_t soc_byte = id(bat_buffer)[i + 1];
                  float soc = ((soc_byte >> 4) * 10.0f) + (soc_byte & 0x0F);
                  if (soc >= 0.0f && soc <= 100.0f) {
                    id(bat_soc).publish_state(soc);
                    ESP_LOGD("BMS", "SOC: %.0f %%", soc);
                  }
                  break;
                }
              }

              id(bat_buffer).clear();
            }
          }
          if (id(bat_buffer).size() > 150) id(bat_buffer).clear();

  # === DC-DC MODBUS ATSAKYMO SURINKĖJAS ===
  - platform: ble_client
    ble_client_id: renogy_dcdc
    name: "Energija | DC-DC Raw HEX"
    id: dcdc_assembled_hex
    service_uuid: "FFF0"
    characteristic_uuid: "FFF1"
    notify: true
    update_interval: 24h
    on_notify:
      - lambda: |-
          for (uint8_t b : x) {
            id(dcdc_buffer).push_back(b);
          }

          if (id(dcdc_buffer).size() >= 71) {
            if (id(dcdc_buffer)[0] == 0xFF && id(dcdc_buffer)[1] == 0x03) {
              // Modbus-like frame
              // Bytes 5-6: Battery Voltage
              // Bytes 7-8: Battery Current
              // Bytes 9-10: Solar Voltage (išraiška)
              // Bytes 11-12: Solar Current

              float b_volts = ((id(dcdc_buffer)[5] << 8) | id(dcdc_buffer)[6]) * 0.1f;
              float b_amps  = ((id(dcdc_buffer)[7] << 8) | id(dcdc_buffer)[8]) * 0.01f;
              float s_volts = ((id(dcdc_buffer)[9] << 8) | id(dcdc_buffer)[10]) * 0.1f;
              float s_amps  = ((id(dcdc_buffer)[11] << 8) | id(dcdc_buffer)[12]) * 0.01f;

              id(dcdc_aux_volts).publish_state(b_volts);
              id(dcdc_solar_volts).publish_state(s_volts);
              id(dcdc_solar_amps).publish_state(s_amps);
              id(dcdc_solar_power).publish_state(s_volts * s_amps);
            }
            id(dcdc_buffer).clear();
          } else if (id(dcdc_buffer).size() > 150) {
            id(dcdc_buffer).clear();
          }

# ==========================================
# INTERVALAI IR CIKLAI
# ==========================================
interval:
  - interval: 100ms
    then:
      - lambda: |-
          while (id(uart_a7670e).available()) {
            uint8_t byte;
            id(uart_a7670e).read_byte(&byte);
            char c = (char)byte;
            id(uart_buf) += c;
            if (c == '\n') {
              std::string line = id(uart_buf);
              id(uart_buf) = "";

              if (line.find("+CPIN: READY") != std::string::npos) {
                id(sim_status) = "READY";
              }

              if (line.find("+CGNSSINFO:") != std::string::npos) {
                std::vector<std::string> p;
                size_t start = line.find(":") + 1;
                size_t end = line.find(",", start);
                while (end != std::string::npos) {
                  p.push_back(line.substr(start, end - start));
                  start = end + 1;
                  end = line.find(",", start);
                }
                p.push_back(line.substr(start));

                std::string fix_mode = p[0];
                while (!fix_mode.empty() && (fix_mode.front() == ' ' || fix_mode.front() == '\t')) {
                  fix_mode.erase(0, 1);
                }

                if ((fix_mode == "2" || fix_mode == "3") && p.size() > 12
                    && !p[5].empty() && !p[7].empty()) {
                  float lat = atof(p[5].c_str());
                  if (p[6] == "S") lat = -lat;
                  float lon = atof(p[7].c_str());
                  if (p[8] == "W") lon = -lon;
                  float alt = atof(p[11].c_str());
                  float speed = (p[9].empty()) ? 0 : atof(p[9].c_str()); // km/h
                  float heading = (p[10].empty()) ? 0 : atof(p[10].c_str()); // degrees

                  id(gps_lat) = lat;
                  id(gps_lon) = lon;
                  id(gps_alt) = alt;
                  id(gps_speed) = speed;
                  id(gps_heading) = heading;
                  id(gps_fix) = true;

                  int sats = 0;
                  if (!p[1].empty()) sats += atoi(p[1].c_str());
                  if (!p[2].empty()) sats += atoi(p[2].c_str());
                  if (!p[3].empty()) sats += atoi(p[3].c_str());
                  if (!p[4].empty()) sats += atoi(p[4].c_str());
                  id(gps_sats) = sats;
                } else {
                  id(gps_fix) = false;
                }
              }

              if (line.find("+CSQ:") != std::string::npos) {
                size_t pos = line.find(":") + 1;
                id(gsm_signal) = atoi(line.c_str() + pos);
              }

              if (line.find("+COPS:") != std::string::npos) {
                size_t q1 = line.find('"');
                size_t q2 = (q1 != std::string::npos) ? line.find('"', q1+1) : std::string::npos;
                if (q1 != std::string::npos && q2 != std::string::npos) {
                  id(gsm_operator) = line.substr(q1+1, q2-q1-1);
                }
              }
            }
          }

  - interval: 10s
    then:
      - uart.write: { id: uart_a7670e, data: "AT+CPIN?\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+CSQ\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+COPS?\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+CGNSSINFO\r\n" }

  - interval: 10s
    then:
      - if:
          condition:
            lambda: 'return id(renogy_dcdc).connected();'
          then:
            - ble_client.ble_write:
                id: renogy_dcdc
                service_uuid: "FFF0"
                characteristic_uuid: "FFF2"
                value: [0xFF, 0x03, 0x01, 0x00, 0x00, 0x21, 0xD1, 0xCA]

# ==========================================
# SKRIPTAI
# ==========================================
script:
  - id: a7670e_init
    then:
      - uart.write: { id: uart_a7670e, data: "AT\r\n" }
      - delay: 1s
      - uart.write: { id: uart_a7670e, data: "AT+CGNSSPWR=1\r\n" }
      - delay: 1s
      - logger.log: "A7670E inicializuotas"

  - id: sms_status_response
    then:
      - lambda: |-
          // SMS atsakymas į "Status?" komandą
          std::string response = "Kemperis OK|Bat:";

          if (!isnan(id(bat_volts).state)) {
            char buf[32];
            snprintf(buf, sizeof(buf), "%.1fV", id(bat_volts).state);
            response += buf;
          }
          response += "|GPS:";

          if (id(gps_fix)) {
            char buf[48];
            snprintf(buf, sizeof(buf), "%.2f,%.2f,%dm", id(gps_lat), id(gps_lon), (int)id(gps_alt));
            response += buf;
          } else {
            response += "NaN";
          }
          response += "|Tilt:";

          if (!isnan(id(roll_sensor).state)) {
            char buf[16];
            snprintf(buf, sizeof(buf), "%d,%d", (int)id(roll_sensor).state, (int)id(pitch_sensor).state);
            response += buf;
          }
          response += "|Temp:";

          if (!isnan(id(bmp_temp).state)) {
            char buf[16];
            snprintf(buf, sizeof(buf), "%.0f", id(bmp_temp).state);
            response += buf;
          }

          // SMS siuntimas (A7670E AT komanda)
          std::string at_cmd = "AT+CMGS=\"+37068123456\"\r\n"; // Pavyzdys tel. numeris
          id(uart_a7670e).write_str(at_cmd.c_str());
          id(uart_a7670e).write_str(response.c_str());
          id(uart_a7670e).write(0x1A); // CTRL+Z SMS completion
