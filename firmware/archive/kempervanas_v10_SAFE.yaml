# kempervanas_v10_SAFE.yaml — STABILŪS KOMPONENTAI TIKTAI
#
# Strategija: TIK 100% PATIKRINTI KOMPONENTAI
# Išimta: Inverteris, DCDC solar dekodavimas, 8 šviesos/jungikliai
#
# Komponentai:
# ✅ V9 VEIKIANTYS: BMP180, ADXL345, A7670E (GPS+GSM), Renogy BLE
# ✅ V9 PATAISYTI: BMS (c0_idx fix), GPS (speed+heading), ADXL345 (domkratai), GSM (SMS)
# ✅ V10 NAUJI: HX711, VL53L0X, TDS (vandens kokybė)

esphome:
  name: kempervanas
  friendly_name: Kempervanas
  on_boot:
    priority: 200
    then:
      - lambda: |-
          // ADXL345 measurement mode
          uint8_t data[2] = {0x2D, 0x08};
          id(i2c_bus).write(0x53, data, 2, true);
      - delay: 500ms
      - script.execute: a7670e_init

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

wifi:
  ap:
    ssid: "Kemperis-Valdymas"
    password: "kemperis123"

web_server:
  port: 80
  version: 2
  local: true

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG
  logs:
    "i2c.idf": WARN
    "esp32_ble": WARN
    component: WARN
    scheduler: WARN
    "esp-idf": WARN
    sensor: INFO
    text_sensor: INFO
    binary_sensor: INFO
    web_server: INFO
    wifi: INFO
    api: INFO
    esp32_ble_client: DEBUG
    ble_client: DEBUG

# ==========================================
# MAGISTRALĖS
# ==========================================
i2c:
  - id: i2c_bus
    sda: GPIO9
    scl: GPIO10
    scan: true
    frequency: 50kHz

uart:
  - id: uart_a7670e
    tx_pin: GPIO40
    rx_pin: GPIO41
    baud_rate: 115200
    rx_buffer_size: 1024
    debug:
      direction: BOTH
      dummy_receiver: false
      after:
        delimiter: "\r\n"
      sequence:
        - lambda: |-
            std::string s(bytes.begin(), bytes.end());
            ESP_LOGD("UART_DATA", "Simcom: %s", s.c_str());

# ==========================================
# PCF8574
# ==========================================
pcf8574:
  - id: pcf_out1
    address: 0x24
  - id: pcf_out2
    address: 0x25
  - id: pcf_in1
    address: 0x21
  - id: pcf_in2
    address: 0x22

# ==========================================
# GLOBALŪS KINTAMIEJI
# ==========================================
globals:
  # ADXL345 kalibracija
  - id: cal_roll
    type: float
    restore_value: true
    initial_value: '0.0'
  - id: cal_pitch
    type: float
    restore_value: true
    initial_value: '0.0'

  # GPS
  - id: gps_lat
    type: float
    initial_value: "0.0"
  - id: gps_lon
    type: float
    initial_value: "0.0"
  - id: gps_alt
    type: float
    initial_value: "0.0"
  - id: gps_speed
    type: float
    initial_value: "0.0"
  - id: gps_heading
    type: float
    initial_value: "0.0"
  - id: gps_sats
    type: int
    initial_value: "0"
  - id: gps_fix
    type: bool
    initial_value: "false"

  # GSM
  - id: uart_buf
    type: std::string
    initial_value: '""'
  - id: gsm_signal
    type: int
    initial_value: "0"
  - id: gsm_operator
    type: std::string
    initial_value: '"Ieskoma..."'
  - id: sim_status
    type: std::string
    initial_value: '"Tikrinama..."'

  # BMS Bufferiai
  - id: bat_buffer
    type: std::vector<uint8_t>

  # Vandens bakas kalibracija
  - id: water_empty_cm
    type: float
    restore_value: true
    initial_value: '30.0'
  - id: water_full_cm
    type: float
    restore_value: true
    initial_value: '5.0'
  - id: water_total_liters
    type: float
    restore_value: true
    initial_value: '150.0'

  # Dujų kalibracija
  - id: gas_empty_weight
    type: float
    restore_value: true
    initial_value: '13.5'
  - id: gas_full_weight
    type: float
    restore_value: true
    initial_value: '23.5'

# ==========================================
# BLUETOOTH — RENOGY (TIK JUNGIMAS, BE DEKODAVIMO)
# ==========================================
esp32_ble_tracker:

ble_client:
  - mac_address: "38:3B:26:79:DB:64"
    id: renogy_batt
    on_connect:
      then:
        - logger.log: "=== Renogy BATERIJA prijungta ==="
    on_disconnect:
      then:
        - logger.log: "Renogy Baterija atsijunge!"

# ==========================================
# MYGTUKAI IR KALIBRACIJA
# ==========================================
button:
  - platform: template
    name: "Pokrypis | Kalibruoti"
    id: calibrate_button
    on_press:
      - lambda: |-
          id(cal_roll) += id(roll_sensor).state;
          id(cal_pitch) += id(pitch_sensor).state;

  - platform: template
    name: "Resursai | Vanduo – Tuščias"
    id: water_empty_button
    on_press:
      - lambda: |-
          id(water_empty_cm) = id(water_distance).state;
          ESP_LOGI("WATER", "Tuščio bako nustatytas: %.1f cm", id(water_empty_cm));

  - platform: template
    name: "Resursai | Vanduo – Pilnas"
    id: water_full_button
    on_press:
      - lambda: |-
          id(water_full_cm) = id(water_distance).state;
          ESP_LOGI("WATER", "Pilno bako nustatytas: %.1f cm", id(water_full_cm));

number:
  - platform: template
    name: "Resursai | Dujų tuščio svoris (kg)"
    id: gas_empty_weight_num
    min_value: 10.0
    max_value: 20.0
    step: 0.1
    unit_of_measurement: "kg"
    lambda: return id(gas_empty_weight);
    set_action:
      - globals.set:
          id: gas_empty_weight
          value: !lambda return x;

  - platform: template
    name: "Resursai | Dujų pilno svoris (kg)"
    id: gas_full_weight_num
    min_value: 20.0
    max_value: 30.0
    step: 0.1
    unit_of_measurement: "kg"
    lambda: return id(gas_full_weight);
    set_action:
      - globals.set:
          id: gas_full_weight
          value: !lambda return x;

# ==========================================
# SENSORIAI
# ==========================================
sensor:
  # === BMP180 ===
  - platform: bmp085
    temperature:
      name: "Aplinka | Temperatūra"
      id: bmp_temp
      filters:
        - offset: -2.0
      accuracy_decimals: 1
    pressure:
      name: "Aplinka | Slėgis"
      id: bmp_pressure
      accuracy_decimals: 1
    update_interval: 30s

  # === ADXL345 ===
  - platform: template
    name: "Pokrypis | Šoninis K-D"
    id: roll_sensor
    unit_of_measurement: "°"
    accuracy_decimals: 0
    update_interval: 1s
    lambda: |-
      uint8_t reg = 0x32;
      id(i2c_bus).write(0x53, &reg, 1, false);
      uint8_t raw[6];
      if (id(i2c_bus).read(0x53, raw, 6) != 0) return {};
      int16_t y = (int16_t)(raw[2] | (raw[3] << 8));
      int16_t z = (int16_t)(raw[4] | (raw[5] << 8));
      return (atan2((float)y * 0.004f, (float)z * 0.004f) * 180.0f / M_PI) - id(cal_roll);

  - platform: template
    name: "Pokrypis | Išilginis P-G"
    id: pitch_sensor
    unit_of_measurement: "°"
    accuracy_decimals: 0
    update_interval: 1s
    lambda: |-
      uint8_t reg = 0x32;
      id(i2c_bus).write(0x53, &reg, 1, false);
      uint8_t raw[6];
      if (id(i2c_bus).read(0x53, raw, 6) != 0) return {};
      int16_t x = (int16_t)(raw[0] | (raw[1] << 8));
      int16_t z = (int16_t)(raw[4] | (raw[5] << 8));
      return (atan2((float)x * 0.004f, (float)z * 0.004f) * 180.0f / M_PI) - id(cal_pitch);

  # === HX711 (DUJŲ SVORIS) ===
  - platform: hx711
    name: "Resursai | Dujos Svoris"
    id: gas_weight
    clk_pin: GPIO48
    dout_pin: GPIO47
    update_interval: 10s
    unit_of_measurement: "kg"
    accuracy_decimals: 1
    filters:
      - offset: -13.5
      - multiply: 0.001

  # === VL53L0X (VANDENS BAKAS) ===
  - platform: vl53l0x
    name: "Resursai | Vanduo – Atstumas"
    id: water_distance
    i2c_id: i2c_bus
    address: 0x29
    accuracy_decimals: 0
    unit_of_measurement: "cm"
    update_interval: 10s
    filters:
      - median:
          window_size: 5

  - platform: template
    name: "Resursai | Vanduo – Lygis"
    id: water_level
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      float distance = id(water_distance).state;
      if (isnan(distance)) return NAN;
      float range = id(water_empty_cm) - id(water_full_cm);
      if (range <= 0) return NAN;
      float level_pct = ((id(water_empty_cm) - distance) / range) * 100.0f;
      return (level_pct < 0) ? 0 : (level_pct > 100) ? 100 : level_pct;

  - platform: template
    name: "Resursai | Vanduo – Litrai"
    id: water_liters
    unit_of_measurement: "L"
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      float level = id(water_level).state;
      if (isnan(level)) return NAN;
      return (level / 100.0f) * id(water_total_liters);

  # === TDS (VANDENS KOKYBĖ) ===
  - platform: adc
    name: "Resursai | Vanduo TDS"
    id: water_tds
    pin: GPIO7
    attenuation: 11db
    unit_of_measurement: "ppm"
    accuracy_decimals: 0
    update_interval: 10s
    filters:
      - multiply: 0.48  # 1023 bit → ppm konversija (kalibruoti!)

  # === GPS ===
  - platform: template
    name: "GPS | Aukštis"
    id: gps_altitude
    unit_of_measurement: "m"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      if (!id(gps_fix)) return NAN;
      return id(gps_alt);

  - platform: template
    name: "GPS | Palydovai"
    id: gps_satellites
    accuracy_decimals: 0
    update_interval: 5s
    lambda: return (float)id(gps_sats);

  - platform: template
    name: "GPS | Greitis"
    id: gps_speed_sensor
    unit_of_measurement: "km/h"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      if (!id(gps_fix)) return NAN;
      return id(gps_speed);

  - platform: template
    name: "GPS | Kryptis"
    id: gps_heading_sensor
    unit_of_measurement: "°"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      if (!id(gps_fix)) return NAN;
      return id(gps_heading);

  # === GSM ===
  - platform: template
    name: "GSM | Signalas"
    id: gsm_signal_pct
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      if (id(gsm_signal) == 0 || id(gsm_signal) >= 99) return 0;
      float pct = (float)id(gsm_signal) / 31.0 * 100.0;
      return (pct > 100) ? 100 : pct;

  # === BATERIJA (BMS) ===
  - platform: template
    name: "Energija | Akum Įtampa"
    id: bat_volts
    unit_of_measurement: "V"
    accuracy_decimals: 2

  - platform: template
    name: "Energija | Akum Srovė"
    id: bat_amps
    unit_of_measurement: "A"
    accuracy_decimals: 2
    update_interval: 10s

  - platform: template
    name: "Energija | Akum SOC"
    id: bat_soc
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 10s

  - platform: template
    name: "Energija | Akum Celė 1"
    id: bat_cell_1
    unit_of_measurement: "V"
    accuracy_decimals: 3

  - platform: template
    name: "Energija | Akum Celė 2"
    id: bat_cell_2
    unit_of_measurement: "V"
    accuracy_decimals: 3

  - platform: template
    name: "Energija | Akum Celė 3"
    id: bat_cell_3
    unit_of_measurement: "V"
    accuracy_decimals: 3

  - platform: template
    name: "Energija | Akum Celė 4"
    id: bat_cell_4
    unit_of_measurement: "V"
    accuracy_decimals: 3

  - platform: template
    name: "Energija | Akum Temp Min"
    id: bat_temp_min
    unit_of_measurement: "°C"
    accuracy_decimals: 1

  - platform: template
    name: "Energija | Akum Temp Max"
    id: bat_temp_max
    unit_of_measurement: "°C"
    accuracy_decimals: 1

# ==========================================
# TEKSTINIAI SENSORIAI
# ==========================================
text_sensor:
  - platform: template
    name: "GSM | SIM Statusas"
    id: sim_status_sensor
    update_interval: 10s
    lambda: return id(sim_status);

  - platform: template
    name: "GSM | Operatorius"
    id: gsm_operator_sensor
    update_interval: 10s
    lambda: |-
      if (id(gsm_operator) == "24602") return std::string("Tele2");
      if (id(gsm_operator) == "24601") return std::string("Telia");
      if (id(gsm_operator) == "24603") return std::string("Bite");
      return id(gsm_operator);

  # BMS - Kraunasi / Išsikrauna
  - platform: template
    name: "Energija | Akum Statusas"
    id: bat_charge_status
    update_interval: 10s

  - platform: template
    name: "GPS | Koordinatės"
    id: gps_coords
    update_interval: 5s
    lambda: |-
      if (id(gps_fix)) {
        char buf[64];
        snprintf(buf, sizeof(buf), "%.6f, %.6f", id(gps_lat), id(gps_lon));
        return std::string(buf);
      }
      return std::string("Ieškoma palydovų...");

  - platform: template
    name: "Pokrypis | Domkratų Patarimas"
    id: domkratu_patarimas
    update_interval: 2s
    lambda: |-
      float roll = id(roll_sensor).state;
      float pitch = id(pitch_sensor).state;
      float ratų_tarpas = 1800.0f;

      if (isnan(roll) || isnan(pitch)) return std::string("---");

      std::string patarimas = "";
      if (fabsf(roll) < 0.5f) {
        patarimas = "Lygu";
      } else {
        float mm_roll = tanf(roll * M_PI / 180.0f) * ratų_tarpas;
        if (roll > 0) {
          patarimas = "Kelti D +" + std::to_string((int)fabsf(mm_roll)) + "mm";
        } else {
          patarimas = "Kelti K +" + std::to_string((int)fabsf(mm_roll)) + "mm";
        }
      }
      return patarimas;

  # === BMS RAW HEX ===
  - platform: ble_client
    ble_client_id: renogy_batt
    name: "Energija | Akum Raw HEX"
    id: bat_assembled_hex
    service_uuid: "FFF0"
    characteristic_uuid: "FFF1"
    notify: true
    update_interval: 24h
    on_notify:
      - lambda: |-
          // === PATAISYTAS BMS DEKODAVIMAS ===
          for (uint8_t b : x) {
            if (b == 0xBB) id(bat_buffer).clear();
            id(bat_buffer).push_back(b);

            if (b == 0xEE && id(bat_buffer).size() > 5) {
              int size = id(bat_buffer).size();

              // HEX dump'as diagnostikai
              std::string hex_dump = "";
              for (int i = 0; i < size && i < 20; i++) {
                char buf[4];
                snprintf(buf, sizeof(buf), "%02X ", id(bat_buffer)[i]);
                hex_dump += buf;
              }
              ESP_LOGD("BMS_RAW", "Frame (%d bytes): %s", size, hex_dump.c_str());

              // ========== BB CUSTOM PROTOCOL (TYPE 0x04, 0x13, 0x01, etc.) ==========
              if (size >= 4 && id(bat_buffer)[0] == 0xBB) {
                uint8_t frame_type = id(bat_buffer)[1];

                // TYPE 0x04: Napięcie + Komórki
                if (frame_type == 0x04 && size >= 6) {
                  // Bytes [2-3]: Napięcie raw (big-endian)
                  uint16_t volt_raw = ((uint16_t)id(bat_buffer)[2] << 8) | id(bat_buffer)[3];
                  // FINAL: divisor = 1360 (suderintas su Renogy: 13.3V)
                  float volts = volt_raw / 1360.0f;

                  // Validacija: 4S LiFePO4 = 10.0-14.5V
                  if (!(volts >= 10.0f && volts <= 14.5f)) {
                    ESP_LOGW("BMS", "TYPE 0x04: ⚠️ Jtampa %.2f V atmesta (out of range) raw %04X", volts, volt_raw);
                    volts = -999.0f;  // Neleistin zenklas
                  } else {
                    ESP_LOGD("BMS", "TYPE 0x04: ✓ Jtampa %.2f V (raw %04X)", volts, volt_raw);
                  }
                  if (volts > -999.0f) {
                    id(bat_volts).publish_state(volts);
                  }

                  // Markers D2, D3 dla komórek
                  for (size_t i = 4; i < size - 2; i++) {
                    if (id(bat_buffer)[i] == 0xD2) {
                      uint16_t cell_raw = ((uint16_t)id(bat_buffer)[i+1] << 8) | id(bat_buffer)[i+2];
                      float cell_v = cell_raw / 1320.0f;
                      if (cell_v > 2.5f && cell_v < 3.8f) {
                        id(bat_cell_1).publish_state(cell_v);
                        id(bat_cell_2).publish_state(cell_v);
                        ESP_LOGD("BMS_CELL", "D2 Cells 1-2: %.3f V", cell_v);
                      }
                    } else if (id(bat_buffer)[i] == 0xD3) {
                      uint16_t cell_raw = ((uint16_t)id(bat_buffer)[i+1] << 8) | id(bat_buffer)[i+2];
                      float cell_v = cell_raw / 1320.0f;
                      if (cell_v > 2.5f && cell_v < 3.8f) {
                        id(bat_cell_3).publish_state(cell_v);
                        id(bat_cell_4).publish_state(cell_v);
                        ESP_LOGD("BMS_CELL", "D3 Cells 3-4: %.3f V", cell_v);
                      }
                    }
                  }

                  if (volts > 5.0f && volts < 20.0f) {
                    id(bat_volts).publish_state(volts);
                    ESP_LOGD("BMS", "TYPE 0x04: Voltage %.2f V (raw %04X)", volts, volt_raw);
                  }
                }

                // TYPE 0x13: Srovė
                else if (frame_type == 0x13 && size >= 5) {
                  // Marker C0/C1 su prądu (16-bit big-endian, 0.01A per unit)
                  for (size_t i = 2; i < size - 2; i++) {
                    if ((id(bat_buffer)[i] == 0xC0 || id(bat_buffer)[i] == 0xC1) &&
                        i + 2 < size) {
                      // Big-endian 16-bit signed (0.01A per unit)
                      int16_t amp_raw = ((int16_t)id(bat_buffer)[i+1] << 8) | id(bat_buffer)[i+2];
                      float amps = amp_raw * 0.01f;

                      // Ženklas: 0xC0 = neigiama (kraunasi), 0xC1 = teigiama (išsikrauna)
                      if (id(bat_buffer)[i] == 0xC0) amps = -amps;

                      // FILTRAS: Renogy PRO 100Ah max = ±120A (su rezervu ±150A)
                      if (amps >= -150.0f && amps <= 150.0f) {
                        id(bat_amps).publish_state(amps);

                        // Kraunasi / Išsikrauna statusas
                        std::string charging_status = "Nejudina";
                        if (amps < -0.5f) charging_status = "Kraunasi";
                        else if (amps > 0.5f) charging_status = "Išsikrauna";
                        id(bat_charge_status).publish_state(charging_status);

                        ESP_LOGD("BMS", "TYPE 0x13: ✓ Srovė %.2f A (0x%02X %02X%02X) → %s",
                                 amps, id(bat_buffer)[i], id(bat_buffer)[i+1], id(bat_buffer)[i+2],
                                 charging_status.c_str());
                      } else {
                        ESP_LOGW("BMS", "TYPE 0x13: ⚠️ Srovė %.2f A atmesta (per didelė/maža) — 0x%02X %02X%02X",
                                 amps, id(bat_buffer)[i], id(bat_buffer)[i+1], id(bat_buffer)[i+2]);
                      }
                      break;  // Naudojame TIKTAI pirmą C0/C1 žymeklį
                    }
                  }
                }

                // TYPE 0x01, etc.: Mixed data
                else if (size >= 5) {
                  ESP_LOGD("BMS", "TYPE 0x%02X: Other frame (size %d)", frame_type, size);
                }
              } else {
                ESP_LOGD("BMS", "⚠️ Not a BB frame or too short");
              }

              id(bat_buffer).clear();
            }
          }
          if (id(bat_buffer).size() > 150) id(bat_buffer).clear();

# ==========================================
# INTERVALAI
# ==========================================
interval:
  - interval: 100ms
    then:
      - lambda: |-
          while (id(uart_a7670e).available()) {
            uint8_t byte;
            id(uart_a7670e).read_byte(&byte);
            char c = (char)byte;
            id(uart_buf) += c;
            if (c == '\n') {
              std::string line = id(uart_buf);
              id(uart_buf) = "";

              if (line.find("+CPIN: READY") != std::string::npos) {
                id(sim_status) = "READY";
              }

              if (line.find("+CGNSSINFO:") != std::string::npos) {
                std::vector<std::string> p;
                size_t start = line.find(":") + 1;
                size_t end = line.find(",", start);
                while (end != std::string::npos) {
                  p.push_back(line.substr(start, end - start));
                  start = end + 1;
                  end = line.find(",", start);
                }
                p.push_back(line.substr(start));

                std::string fix_mode = p[0];
                while (!fix_mode.empty() && (fix_mode.front() == ' ' || fix_mode.front() == '\t')) {
                  fix_mode.erase(0, 1);
                }

                if ((fix_mode == "2" || fix_mode == "3") && p.size() > 13
                    && !p[5].empty() && !p[7].empty()) {
                  float lat = atof(p[5].c_str());
                  if (p[6] == "S") lat = -lat;
                  float lon = atof(p[7].c_str());
                  if (p[8] == "W") lon = -lon;
                  float alt = atof(p[11].c_str());
                  // p[12] = speed (knots), p[13] = heading (degrees)
                  float speed_knots = (p[12].empty()) ? 0 : atof(p[12].c_str());
                  float speed = speed_knots * 1.852f;  // konvertuoti į km/h
                  float heading = (p[13].empty()) ? 0 : atof(p[13].c_str());

                  id(gps_lat) = lat;
                  id(gps_lon) = lon;
                  id(gps_alt) = alt;
                  id(gps_speed) = speed;
                  id(gps_heading) = heading;
                  id(gps_fix) = true;

                  int sats = 0;
                  if (!p[1].empty()) sats += atoi(p[1].c_str());
                  if (!p[2].empty()) sats += atoi(p[2].c_str());
                  if (!p[3].empty()) sats += atoi(p[3].c_str());
                  if (!p[4].empty()) sats += atoi(p[4].c_str());
                  id(gps_sats) = sats;
                } else {
                  id(gps_fix) = false;
                }
              }

              if (line.find("+CSQ:") != std::string::npos) {
                size_t pos = line.find(":") + 1;
                id(gsm_signal) = atoi(line.c_str() + pos);
              }

              if (line.find("+COPS:") != std::string::npos) {
                size_t q1 = line.find('"');
                size_t q2 = (q1 != std::string::npos) ? line.find('"', q1+1) : std::string::npos;
                if (q1 != std::string::npos && q2 != std::string::npos) {
                  id(gsm_operator) = line.substr(q1+1, q2-q1-1);
                }
              }
            }
          }

  - interval: 10s
    then:
      - uart.write: { id: uart_a7670e, data: "AT+CPIN?\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+CSQ\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+COPS?\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+CGNSSINFO\r\n" }

# ==========================================
# SKRIPTAI
# ==========================================
script:
  - id: a7670e_init
    then:
      - uart.write: { id: uart_a7670e, data: "AT\r\n" }
      - delay: 1s
      - uart.write: { id: uart_a7670e, data: "AT+CGNSSPWR=1\r\n" }
      - delay: 1s
      - logger.log: "A7670E inicializuotas"
