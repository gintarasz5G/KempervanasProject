esphome:
  name: kempervanas
  friendly_name: Kempervanas
  on_boot:
    priority: 200
    then:
      - delay: 200ms
      - lambda: |-
          // ADXL345 pažadinimas ±16g režimu su 100Hz filtru
          uint8_t data_fmt[2] = {0x31, 0x0B};
          id(i2c_bus).write(0x53, data_fmt, 2, true);
          uint8_t bw_rate[2] = {0x2C, 0x0A};
          id(i2c_bus).write(0x53, bw_rate, 2, true);
          uint8_t pwr_ctl[2] = {0x2D, 0x08};
          id(i2c_bus).write(0x53, pwr_ctl, 2, true);
      - delay: 8s
      - lambda: 'id(a7670e_init).execute();'

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

wifi:
  ap:
    ssid: "Kemperis-Valdymas"
    password: "kemperis123"

web_server:
  port: 80
  version: 3
  local: true

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

i2c:
  - id: i2c_bus
    sda: GPIO9
    scl: GPIO10
    frequency: 100kHz
    scan: true

uart:
  - id: uart_a7670e
    tx_pin: GPIO40
    rx_pin: GPIO41
    baud_rate: 115200
    rx_buffer_size: 2048

esp32_ble_tracker:

ble_client:
  - mac_address: "38:3B:26:79:DB:64"
    id: junctek_shunt
    on_disconnect:
      then:
        - delay: 2s
        - ble_client.connect: junctek_shunt

globals:
  # --- GPS LAIKAS ---
  - id: gps_time_str
    type: std::string
    initial_value: '"Ieškoma"'

  # --- BUFFERIAI ---
  - id: data_batch
    type: std::string
    initial_value: '""'
  - id: sending_batch
    type: std::string
    initial_value: '""'
  - id: uart_buf
    type: std::string
    initial_value: '""'
  - id: pressure_history
    type: std::vector<float>

  # --- SEMAFORAI IR KONTROLĖ ---
  - id: modem_busy
    type: bool
    initial_value: 'false'
  - id: google_upload_enabled
    type: bool
    restore_value: true
    initial_value: 'true'
  - id: needs_reboot
    type: bool
    initial_value: 'false'

  # --- HIBRIDINIO LOGERIO KINTAMIEJI ---
  - id: last_save_ms
    type: unsigned long
    initial_value: '0'
  - id: last_point_ms
    type: unsigned long
    initial_value: '0'
  - id: last_heading
    type: float
    initial_value: '0.0'
  - id: speed_sum
    type: float
    initial_value: '0.0'
  - id: speed_count
    type: int
    initial_value: '0'

  # --- KALIBRACIJOS & OFFSET ---
  - id: timezone_offset
    type: float
    restore_value: true
    initial_value: '3.0'
  - id: cal_roll
    type: float
    restore_value: true
    initial_value: '0.0'
  - id: cal_pitch
    type: float
    restore_value: true
    initial_value: '0.0'
  - id: temp_offset
    type: float
    restore_value: true
    initial_value: '0.0'
  - id: humid_offset
    type: float
    restore_value: true
    initial_value: '0.0'
  - id: water_offset
    type: float
    restore_value: true
    initial_value: '0.0'
  - id: water_empty_cm
    type: float
    restore_value: true
    initial_value: '30.0'
  - id: water_full_cm
    type: float
    restore_value: true
    initial_value: '5.0'
  - id: gas_empty_weight
    type: float
    restore_value: true
    initial_value: '2.8'
  - id: gas_full_weight
    type: float
    restore_value: true
    initial_value: '7.8'
  - id: hx711_tare
    type: float
    restore_value: true
    initial_value: '0.0'
  - id: hx711_scale
    type: float
    restore_value: true
    initial_value: '20000.0'
  - id: gas_weight_offset
    type: float
    restore_value: true
    initial_value: '0.0'
  - id: bat_capacity_ah
    type: float
    restore_value: true
    initial_value: '110.0'
  - id: wheelbase_cm
    type: float
    restore_value: true
    initial_value: '350.0'
  - id: track_cm
    type: float
    restore_value: true
    initial_value: '180.0'

  # --- BŪSENOS ---
  - id: gps_lat
    type: float
    initial_value: "0.0"
  - id: gps_lon
    type: float
    initial_value: "0.0"
  - id: gps_alt
    type: float
    initial_value: "0.0"
  - id: gps_speed
    type: float
    initial_value: "0.0"
  - id: gps_heading
    type: float
    initial_value: "0.0"
  - id: gps_fix_mode
    type: int
    initial_value: "0"
  - id: gps_fix
    type: bool
    initial_value: "false"
  - id: gps_sats_gps
    type: int
    initial_value: "0"
  - id: gps_sats_glonass
    type: int
    initial_value: "0"
  - id: gps_sats_bds
    type: int
    initial_value: "0"
  - id: gps_sats_galileo
    type: int
    initial_value: "0"
  - id: gsm_signal
    type: int
    initial_value: "0"
  - id: gsm_operator
    type: std::string
    initial_value: '"Ieškoma..."'
  - id: sim_status
    type: std::string
    initial_value: '"Tikrinama..."'
  - id: gps_error_count
    type: int
    initial_value: '0'
  - id: gps_no_fix_time
    type: int
    initial_value: '0'
  - id: http_error_count
    type: int
    initial_value: '0'

  # --- SMS & ALARMAI ---
  - id: sms_sender
    type: std::string
    initial_value: '""'
  - id: cmt_state
    type: int
    initial_value: '0'
  - id: last_sms_send_ms
    type: unsigned long
    initial_value: '0'
  - id: last_alert_water
    type: float
    initial_value: '100.0'
  - id: last_alert_soc
    type: float
    initial_value: '100.0'
  - id: last_alert_humid
    type: float
    initial_value: '0.0'
  - id: voc_baseline
    type: float
    restore_value: true
    initial_value: '0.0'

text:
  - platform: template
    name: "txt_app_script_id"
    id: txt_app_script_id
    optimistic: true
    restore_value: true
    initial_value: "AKfycbwavlvHOeFhw0rsnoUQEtBj98mKy4iowtL8U-1fyAetknCbtL4hpKCOfc8swcpW7E4cEQ"
    mode: text

button:
  - platform: template
    name: "btn_adxl_zero"
    id: btn_adxl_zero
    on_press:
      - lambda: |-
          id(cal_roll)  = id(roll_sensor).state  + id(cal_roll);
          id(cal_pitch) = id(pitch_sensor).state + id(cal_pitch);
  - platform: template
    name: "btn_gas_tare"
    id: btn_gas_tare
    on_press:
      - lambda: 'if (id(gas_hx711_raw).has_state()) id(hx711_tare) = id(gas_hx711_raw).state;'
  - platform: template
    name: "btn_water_empty"
    id: btn_water_empty
    on_press:
      - lambda: 'if (id(water_distance).has_state()) id(water_empty_cm) = id(water_distance).state;'
  - platform: template
    name: "btn_water_full"
    id: btn_water_full
    on_press:
      - lambda: 'if (id(water_distance).has_state()) id(water_full_cm) = id(water_distance).state;'
  - platform: template
    name: "Išvalyti SMS istoriją"
    id: btn_clear_sms
    on_press:
      - lambda: |-
          id(sms_1).publish_state("---");
          id(sms_2).publish_state("---");
          id(sms_3).publish_state("---");
          id(sms_4).publish_state("---");
          id(sms_5).publish_state("---");
  - platform: template
    name: "btn_force_send_google"
    id: btn_force_send_google
    on_press:
      - lambda: |-
          auto safe = [](float v) { return isnan(v) ? 0.0f : v; };
          char row[256];
          snprintf(row, sizeof(row),
            "%s,,%.6f,%.6f,%.1f,%.1f,%.1f,%.0f,%.2f,%.2f,%.0f,%.0f,%.0f,%.1f,%.1f,%.1f;",
            id(gps_time_str).c_str(), safe(id(gps_lat)), safe(id(gps_lon)), safe(id(gps_alt)),
            safe(id(gps_speed)), safe(id(gps_heading)), safe(id(junc_soc).state),
            safe(id(junc_v).state), safe(id(junc_a).state), safe(id(water_level_pct).state),
            safe(id(tds_ppm).state), safe(id(gas_remaining_pct).state),
            safe(id(bme_temp).state), safe(id(bme_humidity).state), safe(id(bme_pressure).state));
          if (id(data_batch).length() < 10000) {
            id(data_batch) += row;
            id(last_point_ms) = millis();
          }
      - script.execute: send_batch_to_google

switch:
  - platform: template
    name: "sw_google_upload"
    id: sw_google_upload
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    icon: "mdi:cloud-upload"
    turn_on_action:
      - globals.set: { id: google_upload_enabled, value: 'true' }
      - script.execute: send_batch_to_google
    turn_off_action:
      - globals.set: { id: google_upload_enabled, value: 'false' }

