  - platform: template
    name: "GPS: Signalas"
    id: gps_fix_sensor
    lambda: 'return id(gps_fix);'

# ==========================================
# ⚙️ SKRIPTAI
# ==========================================
script:
  - id: a7670e_init
    then:
      - uart.write: { id: uart_a7670e, data: "AT\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+CMGF=1\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+CNMI=2,1,0,0,0\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+COPS=3,0\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+CREG=1\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+CGNSSPWR=1\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+CGNSSMODE=3\r\n" }

  - id: send_status_sms
    parameters:
      target_num: std::string
    then:
      - uart.write:
          id: uart_a7670e
          data: !lambda |-
            std::string cmd = "AT+CMGS=\"" + target_num + "\"\r\n";
            return std::vector<uint8_t>(cmd.begin(), cmd.end());
      - delay: 2s
      - uart.write:
          id: uart_a7670e
          data: !lambda |-
            // ASCII tik, max 160 simboliu
            char m[200];
            float ct  = id(cabin_temp).state;
            float prs = id(cabin_pres).state;
            float roll  = id(roll_sensor).state;
            float pitch = id(pitch_sensor).state;
            float gnet  = id(gas_net).state;
            float gpct  = id(gas_pct).state;
            float wpct  = id(water_pct).state;
            snprintf(m, sizeof(m),
              "Kemperis OK\n"
              "GPS: %.6f,%.6f %.0fm\n"
              "Tilt: %.0fd %.0fd\n"
              "Dujos: %.1fkg (%.0f%%)\n"
              "Vanduo: %.0f%%\n"
              "Temp: %.1fC %.0fhPa\x1A",
              id(gps_lat), id(gps_lon),
              id(gps_fix) ? id(gps_alt) : 0.0f,
              isnan(roll)?0:roll, isnan(pitch)?0:pitch,
              isnan(gnet)?0:gnet, isnan(gpct)?0:gpct,
              isnan(wpct)?0:wpct,
              isnan(ct)?0:ct, isnan(prs)?0:prs);
            return std::vector<uint8_t>(m, m + strlen(m));

# ==========================================
# ⏱ INTERVALAI
# ==========================================
interval:
  # --- A7670E UART parseris (200ms) ---
  - interval: 200ms
    then:
      - lambda: |-
          uint8_t byte;
          while (id(uart_a7670e)->available() > 0) {
            if (!id(uart_a7670e)->read_byte(&byte)) break;

            if (id(uart_buf).size() > 1024) {
              ESP_LOGW("a7670e", "UART buffer overflow");
              id(uart_buf).clear();
            }

            char c = (char)byte;
            if (c != '\r') id(uart_buf) += c;
            if (c != '\n') continue;

            std::string line = id(uart_buf);
            id(uart_buf).clear();
            while (!line.empty() && (line.back() == '\n' || line.back() == '\r'))
              line.pop_back();
            if (line.empty()) continue;

            // +CMTI → skaitome SMS sąrašą
            if (line.find("+CMTI:") != std::string::npos) {
              id(uart_a7670e)->write_str("AT+CMGL=\"ALL\"\r\n");
              continue;
            }

            // +CMGL → ištraukiame siuntėją
            if (line.find("+CMGL:") != std::string::npos) {
              size_t q1 = line.find("\",\"");
              size_t q2 = (q1 != std::string::npos) ? line.find("\",\"", q1 + 3) : std::string::npos;
              if (q1 != std::string::npos && q2 != std::string::npos)
                id(sms_sender) = line.substr(q1 + 3, q2 - q1 - 3);
              continue;
            }

            // "Status?" — case-insensitive
            if (!id(sms_sender).empty() &&
                (line.find("Status?") != std::string::npos ||
                 line.find("status?") != std::string::npos ||
                 line.find("STATUS?") != std::string::npos)) {
              id(send_status_sms)->execute(id(sms_sender));
              id(uart_a7670e)->write_str("AT+CMGD=1,3\r\n");
              id(sms_sender).clear();
              continue;
            }

            // +CSQ → signalo stiprumas
            size_t csq = line.find("+CSQ:");
            if (csq != std::string::npos) {
              size_t s = csq + 5;
              while (s < line.size() && line[s] == ' ') s++;
              size_t cm = line.find(',', s);
              if (cm != std::string::npos)
                id(gsm_signal_val) = atoi(line.substr(s, cm - s).c_str());
              continue;
            }

            // +COPS → operatorius
            size_t cops = line.find("+COPS:");
            if (cops != std::string::npos) {
              size_t q1 = line.find('"', cops);
              size_t q2 = (q1 != std::string::npos) ? line.find('"', q1 + 1) : std::string::npos;
              id(gsm_operator) = (q1 != std::string::npos && q2 != std::string::npos)
                                 ? line.substr(q1 + 1, q2 - q1 - 1)
                                 : std::string("Neregistruotas");
              continue;
            }

            // +CREG → tinklo registracija
            size_t creg = line.find("+CREG:");
            if (creg != std::string::npos) {
              size_t comma = line.find(',', creg);
              if (comma != std::string::npos)
                id(gsm_creg_val) = atoi(line.substr(comma + 1, 1).c_str());
              else
                id(gsm_creg_val) = atoi(line.substr(creg + 7, 1).c_str());
              continue;
            }

            // +CPIN → SIM statusas
            if (line.find("+CPIN: READY") != std::string::npos)
              id(sim_status) = "READY";
            else if (line.find("+CPIN: SIM PIN") != std::string::npos)
              id(sim_status) = "PIN reikalingas";
            else if (line.find("+CPIN: SIM PUK") != std::string::npos)
              id(sim_status) = "PUK reikalingas";

            // +CGNSSINFO → GPS duomenys
            size_t gn = line.find("+CGNSSINFO:");
            if (gn != std::string::npos) {
              std::string d = line.substr(gn + 11);
              while (!d.empty() && (d[0] == ' ' || d[0] == '\t')) d.erase(0, 1);
              std::vector<std::string> f;
              size_t p = 0;
              while (true) {
                size_t n = d.find(',', p);
                if (n == std::string::npos) { f.push_back(d.substr(p)); break; }
                f.push_back(d.substr(p, n - p));
                p = n + 1;
              }

              auto valid_coord = [](const std::string& s) -> bool {
                for (char c : s) if (c >= '1' && c <= '9') return true;
                return false;
              };

              int mode = (f.size() > 0 && !f[0].empty()) ? atoi(f[0].c_str()) : 0;
              bool has_fix = (mode == 2 || mode == 3) &&
                             f.size() >= 13 &&
                             valid_coord(f[4]) && valid_coord(f[6]) &&
                             (f[5] == "N" || f[5] == "S") &&
                             (f[7] == "E" || f[7] == "W");

              if (has_fix) {
                id(gps_fix_mode)     = mode;
                id(gps_sats_gps)     = atoi(f[1].c_str());
                id(gps_sats_glonass) = atoi(f[2].c_str());
                id(gps_sats_beidou)  = atoi(f[3].c_str());

                float lr  = atof(f[4].c_str());
                int   ld  = (int)(lr / 100.0f);
                float lat = ld + (lr - ld * 100.0f) / 60.0f;
                if (f[5] == "S") lat = -lat;

                float lnr = atof(f[6].c_str());
                int   lnd = (int)(lnr / 100.0f);
                float lon = lnd + (lnr - lnd * 100.0f) / 60.0f;
                if (f[7] == "W") lon = -lon;

                if (lat >= -90.0f && lat <= 90.0f && lon >= -180.0f && lon <= 180.0f) {
                  id(gps_lat) = lat;
                  id(gps_lon) = lon;
                  id(gps_fix) = true;
                  if (!f[10].empty()) {
                    float alt = atof(f[10].c_str());
                    if (alt > -500.0f && alt < 10000.0f) id(gps_alt) = alt;
                  }
                  if (!f[11].empty()) {
                    float kmh = atof(f[11].c_str()) * 1.852f;
                    if (kmh >= 0.0f && kmh < 300.0f) id(gps_speed_val) = kmh;
                  }
                  if (!f[12].empty()) {
                    float crs = atof(f[12].c_str());
                    if (crs >= 0.0f && crs <= 360.0f) id(gps_course_val) = crs;
                  }
                } else {
                  id(gps_fix) = false;
                }
              } else {
                id(gps_fix)          = false;
                id(gps_fix_mode)     = 0;
                id(gps_lat)          = 0.0f;
                id(gps_lon)          = 0.0f;
                id(gps_alt)          = 0.0f;
                id(gps_speed_val)    = 0.0f;
                id(gps_course_val)   = 0.0f;
                id(gps_sats_gps)     = 0;
                id(gps_sats_glonass) = 0;
                id(gps_sats_beidou)  = 0;
              }
              continue;
            }
          }

  # --- GPS pozicija (kas 10s) ---
  - interval: 10s
    then:
      - uart.write: { id: uart_a7670e, data: "AT+CGNSSINFO\r\n" }

  # --- GSM statusas (kas 60s — taupom energiją) ---
  - interval: 60s
    then:
      - uart.write: { id: uart_a7670e, data: "AT+CSQ\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+COPS?\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+CREG?\r\n" }

  # --- Odometras (min greitis 5 km/h — multipath apsauga) ---
  - interval: 10s
    then:
      - lambda: |-
          if (id(gps_fix) && id(gps_speed_val) > 5.0f)
            id(trip_odometer) += id(gps_speed_val) * (10.0f / 3600.0f);

  # --- Slėgio istorija (7 × 30min = 3.5h prognozei) ---
  - interval: 30min
    then:
      - lambda: |-
          float p = id(cabin_pres).state;
          if (isnan(p) || p <= 0) return;
          if (id(pressure_hist_count) == 0) {
            for (int i = 0; i < 7; i++) id(pressure_hist)[i] = p;
            id(pressure_hist_count) = 1;
            return;
          }
          for (int i = 6; i > 0; i--) id(pressure_hist)[i] = id(pressure_hist)[i-1];
          id(pressure_hist)[0] = p;
          if (id(pressure_hist_count) < 7) id(pressure_hist_count)++;
