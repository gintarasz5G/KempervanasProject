# kempervanas_v14_fixed.yaml — Pilnai pataisytas, kompiliacijai paruoštas failas
# Naudoja C++ .execute() kvietimus vietoje YAML script.run/execute

esphome:
  name: kempervanas
  friendly_name: Kempervanas
  on_boot:
    priority: 200
    then:
      - delay: 200ms
      - lambda: |-
          uint8_t data[2] = {0x2D, 0x08};
          id(i2c_bus).write(0x53, data, 2, true);
      - delay: 500ms
      - lambda: |-
          id(a7670e_init).execute();

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino
    sdkconfig_options:
      CONFIG_ESP32S3_SPIRAM_SUPPORT: y
      CONFIG_SPIRAM_BOOT_INIT: y

wifi:
  ap:
    ssid: "Kemperis-Valdymas"
    password: "kemperis123"

web_server:
  port: 80
  version: 3
  local: true

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG
  logs:
    "i2c.idf": WARN
    "esp-idf": WARN
    "esp32_ble": WARN
    "ble_client": WARN

i2c:
  - id: i2c_bus
    sda: GPIO9
    scl: GPIO10
    frequency: 50kHz
    timeout: 50ms
    scan: true

uart:
  - id: uart_a7670e
    tx_pin: GPIO40
    rx_pin: GPIO41
    baud_rate: 115200
    rx_buffer_size: 2048
    debug:
      direction: BOTH
      dummy_receiver: false
      after:
        delimiter: "\r\n"
      sequence:
        - lambda: |-
            std::string s(bytes.begin(), bytes.end());
            ESP_LOGD("UART_DATA", "Simcom: %s", s.c_str());

pcf8574:
  - id: pcf_out1
    address: 0x24
  - id: pcf_out2
    address: 0x25
  - id: pcf_in1
    address: 0x21
  - id: pcf_in2
    address: 0x22

esp32_ble_tracker:

ble_client:
  - mac_address: "38:3B:26:79:DB:64"
    id: junctek_shunt
    on_disconnect:
      then:
        - delay: 2s
        - ble_client.connect: junctek_shunt

globals:
  - id: junc_buffer
    type: std::vector<uint8_t>

  - id: cal_roll
    type: float
    restore_value: true
    initial_value: '0.0'

  - id: cal_pitch
    type: float
    restore_value: true
    initial_value: '0.0'

  - id: gps_lat
    type: float
    initial_value: "0.0"
  - id: gps_lon
    type: float
    initial_value: "0.0"
  - id: gps_alt
    type: float
    initial_value: "0.0"
  - id: gps_speed
    type: float
    initial_value: "0.0"
  - id: gps_heading
    type: float
    initial_value: "0.0"
  - id: gps_fix_mode
    type: int
    initial_value: "0"
  - id: gps_fix
    type: bool
    initial_value: "false"
  - id: gps_sats_gps
    type: int
    initial_value: "0"
  - id: gps_sats_glonass
    type: int
    initial_value: "0"
  - id: gps_sats_bds
    type: int
    initial_value: "0"
  - id: gps_sats_galileo
    type: int
    initial_value: "0"

  - id: uart_buf
    type: std::string
    initial_value: '""'

  - id: gsm_signal
    type: int
    initial_value: "0"
  - id: gsm_operator
    type: std::string
    initial_value: '"Ieskoma..."'
  - id: sim_status
    type: std::string
    initial_value: '"Tikrinama..."'

  - id: water_empty_cm
    type: float
    restore_value: true
    initial_value: '30.0'
  - id: water_full_cm
    type: float
    restore_value: true
    initial_value: '5.0'
  - id: water_total_liters
    type: float
    restore_value: true
    initial_value: '150.0'

  - id: gas_empty_weight
    type: float
    restore_value: true
    initial_value: '13.5'
  - id: gas_full_weight
    type: float
    restore_value: true
    initial_value: '23.5'

  - id: pressure_history
    type: std::vector<float>

  - id: sms_sender
    type: std::string
    initial_value: '""'
  - id: cmt_state
    type: int
    initial_value: '0'
  - id: last_sms_send_ms
    type: unsigned long
    initial_value: '0'

button:
  - platform: template
    name: "Junctek | Nustatyti Talpa (100Ah)"
    icon: mdi:battery-sync
    on_press:
      - lambda: |-
          std::string cmd = "01W20=1000\r\n";
          auto chr = id(junctek_shunt).get_characteristic((uint16_t)0xFFF0, (uint16_t)0xFFF2);
          if (chr) chr->write_value((uint8_t*)cmd.c_str(), cmd.length());

  - platform: template
    name: "Junctek | Nustatyti SOC 100%"
    icon: mdi:battery-100
    on_press:
      - lambda: |-
          std::string cmd = "01W22=1\r\n";
          auto chr = id(junctek_shunt).get_characteristic((uint16_t)0xFFF0, (uint16_t)0xFFF2);
          if (chr) chr->write_value((uint8_t*)cmd.c_str(), cmd.length());

  - platform: template
    name: "Pokrypis | Kalibruoti (zero)"
    id: calibrate_button
    on_press:
      - lambda: |-
          id(cal_roll) += id(roll_sensor).state;
          id(cal_pitch) += id(pitch_sensor).state;

  - platform: template
    name: "Vanduo | Nustatyti tuscia"
    id: water_empty_button
    on_press:
      - lambda: |-
          if (!isnan(id(water_distance).state)) id(water_empty_cm) = id(water_distance).state;

  - platform: template
    name: "Vanduo | Nustatyti pilna"
    id: water_full_button
    on_press:
      - lambda: |-
          if (!isnan(id(water_distance).state)) id(water_full_cm) = id(water_distance).state;

number:
  - platform: template
    name: "Vanduo | Bako turis (L)"
    id: water_total_liters_num
    min_value: 10.0
    max_value: 500.0
    step: 1.0
    unit_of_measurement: "L"
    lambda: return id(water_total_liters);
    set_action:
      - globals.set: { id: water_total_liters, value: !lambda return x; }

  - platform: template
    name: "Dujos | Tuscio baliono svoris"
    id: gas_empty_weight_num
    min_value: 2.0
    max_value: 25.0
    step: 0.1
    unit_of_measurement: "kg"
    lambda: return id(gas_empty_weight);
    set_action:
      - globals.set: { id: gas_empty_weight, value: !lambda return x; }

  - platform: template
    name: "Dujos | Pilno baliono svoris"
    id: gas_full_weight_num
    min_value: 5.0
    max_value: 50.0
    step: 0.1
    unit_of_measurement: "kg"
    lambda: return id(gas_full_weight);
    set_action:
      - globals.set: { id: gas_full_weight, value: !lambda return x; }

sensor:
  - platform: template
    name: "Energija | Itampa"
    id: junc_v
    unit_of_measurement: "V"
    accuracy_decimals: 2

  - platform: template
    name: "Energija | Srove"
    id: junc_a
    unit_of_measurement: "A"
    accuracy_decimals: 1

  - platform: template
    name: "Energija | SOC"
    id: junc_soc
    unit_of_measurement: "%"
    accuracy_decimals: 0

  - platform: bmp085
    temperature:
      name: "Aplinka | Temperatura"
      id: bmp_temp
      filters: [{ offset: -2.0 }]
      accuracy_decimals: 1
    pressure:
      name: "Aplinka | Slegis"
      id: bmp_pressure
      accuracy_decimals: 1
    update_interval: 30s

  - platform: template
    name: "Pokrypis | Soninis K-D"
    id: roll_sensor
    unit_of_measurement: "°"
    accuracy_decimals: 0
    update_interval: 1s
    lambda: |-
      uint8_t reg = 0x32;
      if (id(i2c_bus).write(0x53, &reg, 1, false) != 0) return NAN;
      uint8_t raw[6];
      if (id(i2c_bus).read(0x53, raw, 6) != 0) return NAN;
      int16_t y = (int16_t)(raw[2] | (raw[3] << 8));
      int16_t z = (int16_t)(raw[4] | (raw[5] << 8));
      float angle = atan2((float)y * 0.004f, (float)z * 0.004f) * 180.0f / M_PI;
      return angle - id(cal_roll);

  - platform: template
    name: "Pokrypis | Isilginis P-G"
    id: pitch_sensor
    unit_of_measurement: "°"
    accuracy_decimals: 0
    update_interval: 1s
    lambda: |-
      uint8_t reg = 0x32;
      if (id(i2c_bus).write(0x53, &reg, 1, false) != 0) return NAN;
      uint8_t raw[6];
      if (id(i2c_bus).read(0x53, raw, 6) != 0) return NAN;
      int16_t x = (int16_t)(raw[0] | (raw[1] << 8));
      int16_t z = (int16_t)(raw[4] | (raw[5] << 8));
      float angle = atan2((float)x * 0.004f, (float)z * 0.004f) * 180.0f / M_PI;
      return angle - id(cal_pitch);

  - platform: hx711
    name: "Dujos | Bendras svoris"
    id: gas_total_weight
    clk_pin: GPIO48
    dout_pin: GPIO47
    update_interval: 5s
    unit_of_measurement: "kg"
    accuracy_decimals: 1
    filters: [{ multiply: 0.001 }]

  - platform: template
    name: "Dujos | Likutis kg"
    id: gas_remaining_kg
    unit_of_measurement: "kg"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: |-
      float total = id(gas_total_weight).state;
      if (isnan(total)) return NAN;
      return std::max(0.0f, total - id(gas_empty_weight));

  - platform: template
    name: "Dujos | Likutis %"
    id: gas_remaining_pct
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      float total = id(gas_total_weight).state;
      if (isnan(total)) return NAN;
      float net = std::max(0.0f, total - id(gas_empty_weight));
      float cap = id(gas_full_weight) - id(gas_empty_weight);
      if (cap < 0.1f) return NAN;
      float pct = (net / cap) * 100.0f;
      return std::min(100.0f, std::max(0.0f, pct));

  - platform: vl53l0x
    name: "Vanduo | Atstumas iki vandens"
    id: water_distance
    i2c_id: i2c_bus
    address: 0x29
    accuracy_decimals: 1
    unit_of_measurement: "cm"
    update_interval: 5s
    filters:
      - multiply: 0.1
      - median:
          window_size: 5
          send_every: 1

  - platform: template
    name: "Vanduo | Lygis %"
    id: water_level_pct
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      float d = id(water_distance).state;
      if (isnan(d)) return NAN;
      float range = id(water_empty_cm) - id(water_full_cm);
      if (range <= 0.1f) return NAN;
      float pct = ((id(water_empty_cm) - d) / range) * 100.0f;
      return std::min(100.0f, std::max(0.0f, pct));

  - platform: template
    name: "Vanduo | Likutis L"
    id: water_liters
    unit_of_measurement: "L"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      float pct = id(water_level_pct).state;
      if (isnan(pct)) return NAN;
      return (pct / 100.0f) * id(water_total_liters);

  - platform: adc
    name: "Vanduo | TDS itampa"
    id: tds_voltage
    pin: GPIO7
    attenuation: 12db
    update_interval: 5s
    unit_of_measurement: "V"
    accuracy_decimals: 3
    internal: true
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1

  - platform: template
    name: "Vanduo | Kokybe TDS"
    id: water_tds
    unit_of_measurement: "PPM"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      float v = id(tds_voltage).state;
      if (isnan(v) || v <= 0.05f) return 0.0f;
      if (v > 2.3f) v = 2.3f;
      return (133.42f * v * v * v - 255.86f * v * v + 857.39f * v) * 0.5f;

  - platform: template
    name: "GPS | Aukstis"
    id: gps_altitude
    unit_of_measurement: "m"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: 'return id(gps_fix) ? id(gps_alt) : NAN;'

  - platform: template
    name: "GPS | Greitis"
    id: gps_speed_sensor
    unit_of_measurement: "km/h"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: 'return id(gps_fix) ? id(gps_speed) : NAN;'

  - platform: template
    name: "GPS | Kryptis"
    id: gps_heading_sensor
    unit_of_measurement: "°"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: 'return id(gps_fix) ? id(gps_heading) : NAN;'

  - platform: template
    name: "GPS | Palydovai Viso"
    id: gps_sats_total_sensor
    accuracy_decimals: 0
    update_interval: 5s
    lambda: return (float)(id(gps_sats_gps) + id(gps_sats_glonass) + id(gps_sats_bds) + id(gps_sats_galileo));

  - platform: template
    name: "GSM | Signalas"
    id: gsm_signal_pct
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      if (id(gsm_signal) == 0 || id(gsm_signal) >= 99) return 0;
      float pct = (float)id(gsm_signal) / 31.0 * 100.0;
      return std::min(100.0f, pct);

text_sensor:
  - platform: ble_client
    ble_client_id: junctek_shunt
    name: "Junctek | Raw"
    service_uuid: "FFF0"
    characteristic_uuid: "FFF1"
    notify: true
    on_notify:
      - lambda: |-
          for (uint8_t b : x) {
            if (b == 0xBB) id(junc_buffer).clear();
            id(junc_buffer).push_back(b);
            if (b == 0xEE && id(junc_buffer).size() > 3) {
              uint8_t m = id(junc_buffer)[1];
              double val = 0;
              bool neg = false;
              int b_idx = 0;
              for (size_t i = 2; i < id(junc_buffer).size() - 1; i++) {
                uint8_t bv = id(junc_buffer)[i];
                if (bv > 0x99) {
                  double f = neg ? -val : val;
                  if (m == 0xD2) id(junc_v).publish_state(f / 10000.0);
                  if (m == 0xC0) id(junc_a).publish_state(f / 10.0);
                  if (m == 0x06) id(junc_soc).publish_state(f);
                  m = bv;
                  val = 0;
                  neg = false;
                  b_idx = 0;
                } else {
                  if (b_idx == 0 && m == 0xC0 && (bv >> 4) == 1) {
                    neg = true;
                    bv &= 0x0F;
                  }
                  val = val * 100 + ((bv >> 4) * 10 + (bv & 0x0F));
                  b_idx++;
                }
              }
              id(junc_buffer).clear();
            }
          }

  - platform: template
    name: "GSM | SIM Statusas"
    id: sim_status_sensor
    lambda: return id(sim_status);

  - platform: template
    name: "GPS | Koordinates"
    id: gps_coords
    lambda: |-
      if (id(gps_fix)) {
        char buf[64];
        snprintf(buf, sizeof(buf), "%.6f, %.6f", id(gps_lat), id(gps_lon));
        return std::string(buf);
      }
      return std::string("Ieskoma...");

  - platform: template
    name: "Pokrypis | Domkratu patarimas"
    id: domkratu_patarimas
    lambda: |-
      float roll = id(roll_sensor).state;
      float pitch = id(pitch_sensor).state;
      if (isnan(roll) || isnan(pitch)) return std::string("...");
      const float threshold = 0.5f;
      const float track_cm = 180.0f;
      const float base_cm = 366.5f;
      if (std::abs(roll) < threshold && std::abs(pitch) < threshold) return std::string("Lygu");
      std::string out;
      if (roll > threshold) out = "K+" + std::to_string((int)std::round(std::tan(roll * M_PI / 180.0f) * track_cm)) + "cm";
      else if (roll < -threshold) out = "D+" + std::to_string((int)std::round(std::tan(-roll * M_PI / 180.0f) * track_cm)) + "cm";
      if (pitch > threshold) out += " G+" + std::to_string((int)std::round(std::tan(pitch * M_PI / 180.0f) * base_cm)) + "cm";
      else if (pitch < -threshold) out += " P+" + std::to_string((int)std::round(std::tan(-pitch * M_PI / 180.0f) * base_cm)) + "cm";
      return out;

  - platform: template
    name: "Aplinka | Oru prognoze"
    id: weather_forecast
    lambda: |-
      auto& h = id(pressure_history);
      if (h.size() < 7) return std::string("Kaupiama");
      float trend = h.back() - h.front();
      if (trend > 2.0f) return std::string("Geras");
      if (trend > 0.5f) return std::string("Gereja");
      if (trend < -2.0f) return std::string("Blogas");
      if (trend < -0.5f) return std::string("Blogeja");
      return std::string("Stabilus");

interval:
  - interval: 5s
    then:
      - if:
          condition:
            lambda: 'return id(junctek_shunt).connected();'
          then:
            - ble_client.ble_write:
                id: junctek_shunt
                service_uuid: "FFF0"
                characteristic_uuid: "FFF2"
                value: [0xFF, 0x03, 0x01, 0x00, 0x00, 0x21, 0xD1, 0xCA]

  - interval: 100ms
    then:
      - lambda: |-
          while (id(uart_a7670e).available()) {
            uint8_t b;
            id(uart_a7670e).read_byte(&b);
            char c = (char)b;
            id(uart_buf) += c;
            if (c == '\n') {
              std::string line = id(uart_buf);
              id(uart_buf) = "";
              if (line.find("+CPIN: READY") != std::string::npos) id(sim_status) = "READY";
              if (line.find("+CSQ:") != std::string::npos) {
                int pos = line.find(":");
                if (pos != -1) id(gsm_signal) = atoi(line.c_str() + pos + 1);
              }
              if (line.find("+CGNSSINFO:") != std::string::npos) {
                std::vector<std::string> p;
                size_t s = line.find(":") + 1;
                size_t e = line.find(",", s);
                while (e != std::string::npos) {
                  p.push_back(line.substr(s, e - s));
                  s = e + 1;
                  e = line.find(",", s);
                }
                p.push_back(line.substr(s));
                if (p.size() >= 14) {
                  int fm = atoi(p[0].c_str());
                  id(gps_fix_mode) = fm;
                  id(gps_sats_gps)     = p[1].empty() ? 0 : atoi(p[1].c_str());
                  id(gps_sats_glonass) = p[2].empty() ? 0 : atoi(p[2].c_str());
                  id(gps_sats_bds)     = p[3].empty() ? 0 : atoi(p[3].c_str());
                  id(gps_sats_galileo) = p[4].empty() ? 0 : atoi(p[4].c_str());
                  if ((fm == 2 || fm == 3) && !p[5].empty()) {
                    float lat = atof(p[5].c_str());
                    if (p[6] == "S") lat = -lat;
                    float lon = atof(p[7].c_str());
                    if (p[8] == "W") lon = -lon;
                    id(gps_lat) = lat;
                    id(gps_lon) = lon;
                    id(gps_alt) = p[11].empty() ? 0 : atof(p[11].c_str());
                    id(gps_speed) = p[12].empty() ? 0 : atof(p[12].c_str()) * 1.852f;
                    id(gps_heading) = p[13].empty() ? 0 : atof(p[13].c_str());
                    id(gps_fix) = true;
                  } else {
                    id(gps_fix) = false;
                  }
                }
              }
              if (line.find("+CMT:") != std::string::npos) {
                size_t q1 = line.find('"');
                size_t q2 = line.find('"', q1 + 1);
                if (q1 != std::string::npos && q2 != std::string::npos) {
                  id(sms_sender) = line.substr(q1 + 1, q2 - q1 - 1);
                  id(cmt_state) = 1;
                }
              } else if (id(cmt_state) == 1) {
                id(cmt_state) = 0;
                std::string body = line;
                std::string low = body;
                for (auto &ch : low) ch = tolower(ch);
                if (low.find("status") != std::string::npos || body == "?") {
                  unsigned long now = millis();
                  if (now - id(last_sms_send_ms) > 30000) {
                    id(last_sms_send_ms) = now;
                    id(sms_send_status).execute();
                  }
                }
              }
            }
          }

  - interval: 10s
    then:
      - uart.write: { id: uart_a7670e, data: "AT+CPIN?\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+CSQ\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+CGNSSINFO\r\n" }

  - interval: 30min
    then:
      - lambda: |-
          if (!isnan(id(bmp_pressure).state)) {
            id(pressure_history).push_back(id(bmp_pressure).state);
            if (id(pressure_history).size() > 7) id(pressure_history).erase(id(pressure_history).begin());
          }

script:
  - id: a7670e_init
    then:
      - uart.write: "AT\r\n"
      - delay: 1s
      - uart.write: "AT+CGNSSPWR=1\r\n"
      - delay: 1s
      - uart.write: "AT+CMGF=1\r\n"
      - delay: 500ms
      - uart.write: "AT+CNMI=2,2,0,0,0\r\n"

  - id: sms_send_status
    mode: queued
    max_runs: 5
    then:
      - uart.write:
          id: uart_a7670e
          data: !lambda |-
            std::string cmd = "AT+CMGS=\"" + id(sms_sender) + "\"\r\n";
            return std::vector<uint8_t>(cmd.begin(), cmd.end());
      - delay: 1500ms
      - uart.write:
          id: uart_a7670e
          data: !lambda |-
            auto fnz = [](float v, float fb=0.0f) { return isnan(v) ? fb : v; };
            char body[240];
            snprintf(body, sizeof(body),
              "Bat:%d%% %.1fV %.1fA\n"
              "H2O:%d%% %dL Gas:%d%% %.1fkg\n"
              "GPS:%.4f,%.4f %.0fm\n"
