# kempervanas_v7.yaml — PILNA RENOGY (BT-2 + BMS) INTEGRACIJA
#
# Pakeitimai:
# 1. Pataisyta ble_client.is_connected klaida naudojant lambda C++ patikrinimą.
# 2. Pridėti globalūs buferiai (dcdc_buffer, bat_buffer).
# 3. Baterijos paketas surenkamas nuo BB iki EE.
# 4. DC-DC per BT-2 siunčia užklausas kas 10s (tik jei yra ryšys) ir 
#    surenka 71 baito atsakymą įtampai/srovei ištraukti.

esphome:
  name: kempervanas
  friendly_name: Kempervanas
  on_boot:
    priority: 200
    then:
      - lambda: |-
          // ADXL345 measurement mode
          uint8_t data[2] = {0x2D, 0x08};
          id(i2c_bus).write(0x53, data, 2, true);
      - delay: 500ms
      - script.execute: a7670e_init

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

wifi:
  ap:
    ssid: "Kemperis-Valdymas"
    password: "kemperis123"

web_server:
  port: 80
  version: 2
  local: true

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG
  logs:
    "i2c.idf": WARN
    "esp32_ble": WARN
    component: WARN
    scheduler: WARN
    "esp-idf": WARN
    sensor: INFO
    text_sensor: INFO
    binary_sensor: INFO
    switch: INFO
    web_server: INFO
    wifi: INFO
    api: INFO
    esp32_ble_client: DEBUG
    ble_client: DEBUG
    ble_text_sensor: DEBUG

# ==========================================
# MAGISTRALĖS IR MODULIAI
# ==========================================
i2c:
  - id: i2c_bus
    sda: GPIO9
    scl: GPIO10
    scan: true
    frequency: 50kHz

uart:
  - id: uart_a7670e
    tx_pin: GPIO40
    rx_pin: GPIO41
    baud_rate: 115200
    rx_buffer_size: 1024
    debug:
      direction: BOTH
      dummy_receiver: false
      after:
        delimiter: "\r\n"
      sequence:
        - lambda: |-
            std::string s(bytes.begin(), bytes.end());
            ESP_LOGD("UART_DATA", "Simcom: %s", s.c_str());

pcf8574:
  - id: pcf_out1
    address: 0x24
  - id: pcf_out2
    address: 0x25
  - id: pcf_in1
    address: 0x21
  - id: pcf_in2
    address: 0x22

# ==========================================
# GLOBALŪS KINTAMIEJI IR BUFERIAI
# ==========================================
globals:
  - id: cal_roll
    type: float
    restore_value: true
    initial_value: '0.0'
  - id: cal_pitch
    type: float
    restore_value: true
    initial_value: '0.0'
  - id: gps_lat
    type: float
    initial_value: "0.0"
  - id: gps_lon
    type: float
    initial_value: "0.0"
  - id: gps_alt
    type: float
    initial_value: "0.0"
  - id: gps_sats
    type: int
    initial_value: "0"
  - id: gps_fix
    type: bool
    initial_value: "false"
  - id: uart_buf
    type: std::string
    initial_value: '""'
  - id: gsm_signal
    type: int
    initial_value: "0"
  - id: gsm_operator
    type: std::string
    initial_value: '"Ieskoma..."'
  - id: sim_status
    type: std::string
    initial_value: '"Tikrinama..."'
  # BLE Buferiai suskaidytiems paketams
  - id: dcdc_buffer
    type: std::vector<uint8_t>
  - id: bat_buffer
    type: std::vector<uint8_t>

# ==========================================
# BLUETOOTH (BLE) IR RENOGY
# ==========================================
esp32_ble_tracker:

ble_client:
  - mac_address: "38:3B:26:79:DB:64"
    id: renogy_batt
    on_connect:
      then:
        - logger.log:
            format: "=== Renogy BATERIJA prijungta ==="
            level: INFO
    on_disconnect:
      then:
        - logger.log: "Renogy Baterija atsijunge!"

  - mac_address: "C4:D3:6A:63:D6:42"
    id: renogy_dcdc
    on_connect:
      then:
        - logger.log:
            format: "=== Renogy DC-DC prijungtas ==="
            level: INFO
    on_disconnect:
      then:
        - logger.log: "Renogy DC-DC atsijunge!"

# ==========================================
# MYGTUKAI IR JUNGIKLIAI
# ==========================================
binary_sensor:
  - platform: gpio
    name: "Mygtukas 1"
    id: btn1
    pin: { pcf8574: pcf_in1, number: 0, mode: INPUT, inverted: true }
    on_press:
      - switch.toggle: lempa1

button:
  - platform: template
    name: "Pokrypis | Kalibruoti"
    id: calibrate_button
    on_press:
      - lambda: |-
          id(cal_roll) += id(roll_sensor).state;
          id(cal_pitch) += id(pitch_sensor).state;

switch:
  - platform: gpio
    name: "Sviesos | Lempa 1"
    id: lempa1
    pin: { pcf8574: pcf_out1, number: 0, mode: OUTPUT, inverted: false }
  - platform: gpio
    name: "Sviesos | Inverteris"
    id: inverteris
    pin: { pcf8574: pcf_out2, number: 0, mode: OUTPUT, inverted: false }

# ==========================================
# SENSORIAI
# ==========================================
sensor:
  # === BMP180 ===
  - platform: bmp085
    temperature:
      name: "Aplinka | Temperatura"
      id: bmp_temp
      filters:
        - offset: -2.0
    pressure:
      name: "Aplinka | Slegis"
      id: bmp_pressure
    update_interval: 10s

  # === ADXL345 ===
  - platform: template
    name: "Pokrypis | KD"
    id: roll_sensor
    unit_of_measurement: "°"
    accuracy_decimals: 0
    update_interval: 1s
    lambda: |-
      uint8_t reg = 0x32;
      id(i2c_bus).write(0x53, &reg, 1, false);
      uint8_t raw[6];
      if (id(i2c_bus).read(0x53, raw, 6) != 0) return {};
      int16_t y = (int16_t)(raw[2] | (raw[3] << 8));
      int16_t z = (int16_t)(raw[4] | (raw[5] << 8));
      return (atan2((float)y * 0.004f, (float)z * 0.004f) * 180.0f / M_PI) - id(cal_roll);

  - platform: template
    name: "Pokrypis | PG"
    id: pitch_sensor
    unit_of_measurement: "°"
    accuracy_decimals: 0
    update_interval: 1s
    lambda: |-
      uint8_t reg = 0x32;
      id(i2c_bus).write(0x53, &reg, 1, false);
      uint8_t raw[6];
      if (id(i2c_bus).read(0x53, raw, 6) != 0) return {};
      int16_t x = (int16_t)(raw[0] | (raw[1] << 8));
      int16_t z = (int16_t)(raw[4] | (raw[5] << 8));
      return (atan2((float)x * 0.004f, (float)z * 0.004f) * 180.0f / M_PI) - id(cal_pitch);

  # === GPS ===
  - platform: template
    name: "GPS | Aukstis"
    id: gps_altitude
    unit_of_measurement: "m"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      if (!id(gps_fix)) return NAN;
      return id(gps_alt);

  - platform: template
    name: "GPS | Palydovai"
    id: gps_satellites
    accuracy_decimals: 0
    update_interval: 5s
    lambda: return (float)id(gps_sats);

  # === GSM ===
  - platform: template
    name: "GSM | Signalas"
    id: gsm_signal_pct
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      if (id(gsm_signal) == 0 || id(gsm_signal) >= 99) return 0;
      float pct = (float)id(gsm_signal) / 31.0 * 100.0;
      return (pct > 100) ? 100 : pct;

  # === DC-DC ISKODUOTI DUOMENYS (Modbus BT-2) ===
  - platform: template
    name: "DCDC | Aux Baterijos Itampa"
    id: dcdc_volts
    unit_of_measurement: "V"
    accuracy_decimals: 1

  - platform: template
    name: "DCDC | Krovimo Srove"
    id: dcdc_amps
    unit_of_measurement: "A"
    accuracy_decimals: 2

# ==========================================
# TEKSTINIAI SENSORIAI (DUOMENŲ SRAUTAI)
# ==========================================
text_sensor:
  - platform: template
    name: "GSM | SIM Statusas"
    id: sim_status_sensor
    update_interval: 10s
    lambda: return id(sim_status);

  - platform: template
    name: "GSM | Operatorius"
    id: gsm_operator_sensor
    update_interval: 10s
    lambda: |-
      if (id(gsm_operator) == "24602") return std::string("Tele2");
      if (id(gsm_operator) == "24601") return std::string("Telia");
      if (id(gsm_operator) == "24603") return std::string("Bite");
      return id(gsm_operator);

  - platform: template
    name: "GPS | Koordinates"
    id: gps_coords
    update_interval: 5s
    lambda: |-
      if (id(gps_fix)) {
        char buf[64];
        snprintf(buf, sizeof(buf), "%.6f, %.6f", id(gps_lat), id(gps_lon));
        return std::string(buf);
      }
      return std::string("Ieskoma palydovu...");

  # === BATERIJOS PILNO KADRO (BB...EE) SURINKĖJAS ===
  - platform: ble_client
    ble_client_id: renogy_batt
    name: "Baterija | Assembled Frame"
    id: bat_assembled_hex
    service_uuid: "FFF0"
    characteristic_uuid: "FFF1"
    notify: true
    update_interval: 24h
    on_notify:
      - lambda: |-
          for (uint8_t b : x) {
            // Jei prasideda naujas paketas, išvalome buferį
            if (b == 0xBB) id(bat_buffer).clear();
            id(bat_buffer).push_back(b);
            
            // Jei gavome pabaigos baitą (ir paketas ne per trumpas)
            if (b == 0xEE && id(bat_buffer).size() > 5) {
              std::string hex;
              for (uint8_t buf_b : id(bat_buffer)) {
                char str[4];
                snprintf(str, sizeof(str), "%02X", buf_b);
                hex += str;
              }
              id(bat_assembled_hex).publish_state(hex);
              ESP_LOGI("BMS_FRAME", "Pilnas BMS paketas [%d B]: %s", id(bat_buffer).size(), hex.c_str());
              id(bat_buffer).clear();
            }
          }
          // Apsauga nuo perpildymo
          if (id(bat_buffer).size() > 150) id(bat_buffer).clear();

  # === DC-DC MODBUS ATSAKYMO SURINKĖJAS ===
  - platform: ble_client
    ble_client_id: renogy_dcdc
    name: "DCDC | Assembled Modbus"
    id: dcdc_assembled_hex
    service_uuid: "FFF0"
    characteristic_uuid: "FFF1"
    notify: true
    update_interval: 24h
    on_notify:
      - lambda: |-
          for (uint8_t b : x) {
            id(dcdc_buffer).push_back(b);
          }
          
          // Laukiam pilno atsakymo iš 33 registrų užklausos (ilgis 71 baitas)
          if (id(dcdc_buffer).size() >= 71) {
            if (id(dcdc_buffer)[0] == 0xFF && id(dcdc_buffer)[1] == 0x03) {
              
              // Pagal Renogy Modbus standartą apskaičiuojame reikšmes:
              // Reg 0x0101 (Battery Volts) -> Offset 5 ir 6
              float b_volts = ((id(dcdc_buffer)[5] << 8) | id(dcdc_buffer)[6]) * 0.1;
              // Reg 0x0102 (Charge Current) -> Offset 7 ir 8
              float b_amps  = ((id(dcdc_buffer)[7] << 8) | id(dcdc_buffer)[8]) * 0.01;
              
              id(dcdc_volts).publish_state(b_volts);
              id(dcdc_amps).publish_state(b_amps);
              ESP_LOGI("DCDC_MODBUS", "DC-DC Nuskaityta: %.1fV, %.2fA", b_volts, b_amps);
            }
            id(dcdc_buffer).clear();
          } else if (id(dcdc_buffer).size() > 150) {
            id(dcdc_buffer).clear(); // Apsauga
          }

# ==========================================
# INTERVALAI IR CIKLAI
# ==========================================
interval:
  # SIM7670E UART nuskaitymas
  - interval: 100ms
    then:
      - lambda: |-
          while (id(uart_a7670e).available()) {
            uint8_t byte;
            id(uart_a7670e).read_byte(&byte);
            char c = (char)byte;
            id(uart_buf) += c;
            if (c == '\n') {
              std::string line = id(uart_buf);
              id(uart_buf) = "";

              if (line.find("+CPIN: READY") != std::string::npos) {
                id(sim_status) = "READY";
              }

              if (line.find("+CGNSSINFO:") != std::string::npos) {
                std::vector<std::string> p;
                size_t start = line.find(":") + 1;
                size_t end = line.find(",", start);
                while (end != std::string::npos) {
                  p.push_back(line.substr(start, end - start));
                  start = end + 1;
                  end = line.find(",", start);
                }
                p.push_back(line.substr(start));

                std::string fix_mode = p[0];
                while (!fix_mode.empty() && (fix_mode.front() == ' ' || fix_mode.front() == '\t')) {
                  fix_mode.erase(0, 1);
                }

                if ((fix_mode == "2" || fix_mode == "3") && p.size() > 11
                    && !p[5].empty() && !p[7].empty()) {
                  float lat = atof(p[5].c_str());
                  if (p[6] == "S") lat = -lat;
                  float lon = atof(p[7].c_str());
                  if (p[8] == "W") lon = -lon;

                  id(gps_lat) = lat;
                  id(gps_lon) = lon;
                  id(gps_alt) = atof(p[11].c_str());
                  id(gps_fix) = true;

                  int sats = 0;
                  if (!p[1].empty()) sats += atoi(p[1].c_str());
                  if (!p[2].empty()) sats += atoi(p[2].c_str());
                  if (!p[3].empty()) sats += atoi(p[3].c_str());
                  if (!p[4].empty()) sats += atoi(p[4].c_str());
                  id(gps_sats) = sats;
                } else {
                  id(gps_fix) = false;
                }
              }

              if (line.find("+CSQ:") != std::string::npos) {
                size_t pos = line.find(":") + 1;
                id(gsm_signal) = atoi(line.c_str() + pos);
              }

              if (line.find("+COPS:") != std::string::npos) {
                size_t q1 = line.find('"');
                size_t q2 = (q1 != std::string::npos) ? line.find('"', q1+1) : std::string::npos;
                if (q1 != std::string::npos && q2 != std::string::npos) {
                  id(gsm_operator) = line.substr(q1+1, q2-q1-1);
                }
              }
            }
          }

  # AT komandų siuntimas
  - interval: 10s
    then:
      - uart.write: { id: uart_a7670e, data: "AT+CPIN?\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+CSQ\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+COPS?\r\n" }
      - delay: 500ms
      - uart.write: { id: uart_a7670e, data: "AT+CGNSSINFO\r\n" }

  # DC-DC Modbus Polling (Nuskaito 33 registrus nuo adreso 0x0100)
  # PATAISYMAS: Naudojama lambda vietoje ble_client.is_connected
  - interval: 10s
    then:
      - if:
          condition:
            lambda: 'return id(renogy_dcdc).connected();'
          then:
            - ble_client.ble_write:
                id: renogy_dcdc
                service_uuid: "FFF0"
                characteristic_uuid: "FFF2"
                value: [0xFF, 0x03, 0x01, 0x00, 0x00, 0x21, 0xD1, 0xCA]

# ==========================================
# SKRIPTAI
# ==========================================
script:
  - id: a7670e_init
    then:
      - uart.write: { id: uart_a7670e, data: "AT\r\n" }
      - delay: 1s
      - uart.write: { id: uart_a7670e, data: "AT+CGNSSPWR=1\r\n" }
      - delay: 1s
      - logger.log: "A7670E inicializuotas"