## PROBLEMA 1: JUNCTEK BLE PARSING — Klaidingi Duomenys

### Current State (from web dashboard):
```
Akum įtampa: 1.60V         (WRONG — turėtų 14.19V)
Akum srovė: 21.8A          (WRONG — turėtų 3.70A)
Akum galia: 3W             (WRONG — turėtų ~52W)
Akum temp: 20.0°C          (?)
Akum Ah likutis: 108.7 Ah  (?)
```

### Known Facts:
1. Junctek BLE connects successfully → `[I][ble_text_sensor:041]: Connected successfully!`
2. Junctek raw data shows symbols: `E◆◆◆` (HEX bytes)
3. Previous v15 config rodė: 11.21V / 0.5A (also wrong, but different values)
4. Hardware Junctek display: 14.19V / 3.70A (CORRECT reference)

### Root Cause Hypothesis:
- **BLE Frame Format Unknown** — need actual HEX dump
- Current parsing assumes voltage at buf[1]/buf[2], but:
  - Maybe format is different (no 0xC0/0xC1 markers)
  - Maybe offset is different
  - Maybe endianness is different
  - Maybe data is encrypted/encoded differently

### Required Debug Data:
```
[JUNCTEK] BLE frame (? bytes):
  [0]=0x??
  [1]=0x??
  [2]=0x??
  ...
  [n]=0x??
[JUNCTEK] Parsed voltage: ?.??V from [1]=0x?? [2]=0x??
```

**ACTION:** Run with DEBUG logai 5+ frames, save HEX output

### Potential Solutions:
1. **If 0xC0/0xC1 markers present** → revert to marker-based parsing
2. **If fixed position** → adjust offset (buf[1]/buf[2] vs buf[3]/buf[4], etc.)
3. **If BCD encoding wrong** → try different formulas:
   - Single byte: `val = ((buf[i] >> 4) * 10 + (buf[i] & 0x0F))`
   - Two bytes: `val = buf[i]*100 + buf[i+1]`
   - Swapped endian: `buf[2]` first, then `buf[1]`
4. **If multiplier wrong** → try `/10` instead of `/100`

### Junctek References:
- [jowser7/Junctek_BLE](https://github.com/jowser7/Junctek_BLE)
- [chriskomus/ble-sniffer-walkthrough](https://github.com/chriskomus/ble-sniffer-walkthrough)
- Protocol: Check if 0xC0/0xC1 really exist or different markers

