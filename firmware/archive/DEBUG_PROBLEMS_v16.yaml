## PROBLEMA 2: BME680 KOMUNIKACIJA — Communication Failed

### Current State (from web dashboard):
```
Aplinka | Temperatura: NA          (should be 17-20°C)
Aplinka | Drėgmė: NA              (should be 40-60%)
Aplinka | Slėgis: NA              (should be 1013 hPa)
Aplinka | VOC varža: NA           (should be 45000-100000Ω)
Aplinka | Aukštis: NA             (calculated from pressure)
Aplinka | Oro kokybė: Matavimas... (waiting for gas_resistance)
```

### Boot Log Error:
```
[15:37:39.192][C][bme680.sensor:214]: BME680:
[15:37:39.193][C][bme680.sensor:215]:   Address: 0x76
[15:37:39.193][E][bme680.sensor:217]: Communication failed
[15:37:39.207][E][component:224]:   bme680.sensor is marked FAILED: unspecified
```

### I2C Scan Results (Good):
```
Found device at address 0x77  ← BME680 IS HERE
```

### Known Facts:
1. I2C scan FINDS device at 0x77 → hardware OK
2. But BME680 configured for 0x77 → Communication failed
3. Previous v15 had same address 0x77 → WORKED (got temperature readings)
4. Configuration is identical to working v15
5. Only change: removed heater/iir_filter, then added back simplified

### Root Cause Hypothesis:
- **Sensor not initializing properly** — possible causes:
  1. SDA/SCL pullup resistors missing/weak
  2. Sensor power supply unstable
  3. I2C timing issue (frequency 100kHz might be too slow for BME680)
  4. Sensor bootloader/firmware issue
  5. Pin conflicts (SDA=GPIO9, SCL=GPIO10 — check if used elsewhere)
  6. Boot sequence timing — sensor needs power+time before init

### Required Debug Data:
```
esphome logs — search for:
[C][i2c.idf:119]: Found device at address 0x77  ← CONFIRMED
[C][bme680.sensor:215]:   Address: 0x77
[E][bme680.sensor:217]: Communication failed      ← WHERE IS ERROR?

Check for:
- I2C read/write errors
- Timeout errors
- GPIO conflicts
- Power rail issues
```

### Potential Solutions:

**Option A: Try different I2C frequency**
```yaml
i2c:
  - id: i2c_bus
    sda: GPIO9
    scl: GPIO10
    frequency: 100kHz      # Currently set
    # Try: 50kHz (slower, more stable)
    # Try: 200kHz (faster, might help)
```

**Option B: Add I2C delay/recovery**
```yaml
i2c:
  - id: i2c_bus
    sda: GPIO9
    scl: GPIO10
    frequency: 100kHz
    scan: true
    recovery: true  # Auto-recover if bus hangs
```

**Option C: Check GPIO conflicts**
- SDA=GPIO9, SCL=GPIO10
- Search YAML for other uses of GPIO9, GPIO10
- Confirm no conflicts with UART, SPI, etc.

**Option D: Full BME680 config (with heater properly set)**
```yaml
  - platform: bme680
    i2c_id: i2c_bus
    address: 0x77
    update_interval: 30s
    temperature:
      name: "Aplinka | Temperatura"
      id: bme_temp
      filters: [{ offset: -4.0 }]
    pressure:
      name: "Aplinka | Slegis"
      id: bme_pressure
    humidity:
      name: "Aplinka | Dregme"
      id: bme_humidity
    gas_resistance:
      name: "Aplinka | VOC varza"
      id: bme_voc_ohm
```

**Option E: Try 0x76 address (if hardware supports SDO pin)**
```yaml
address: 0x76  # If SDO pin is connected to GND
```

### BME680 References:
- ESPHome: https://esphome.io/components/sensor/bme680.html
- Datasheet: Bosch BME680 I2C address 0x76 (SDO→GND) or 0x77 (SDO→VCC)
- Check hardware: which is SDO pin connected to?

