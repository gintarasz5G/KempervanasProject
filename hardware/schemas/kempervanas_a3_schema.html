<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<title>Kempervanas — A3 Schema · KC868-A16v3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Fraunces:opsz,wght@9..144,400;7..144,600;9..144,900&display=swap');

  @page {
    size: A3 landscape;
    margin: 0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #b5ad95;
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .page {
    width: 420mm;
    height: 297mm;
    background: #f5f1e8;
    position: relative;
    box-shadow: 0 10px 60px rgba(0,0,0,0.3);
    overflow: hidden;
  }

  svg { display: block; width: 100%; height: 100%; }

  .print-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 12px 22px;
    background: #1a1a1a;
    color: #f5f1e8;
    border: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    z-index: 100;
    box-shadow: 4px 4px 0 #b8410e;
    transition: all 0.1s;
  }

  .print-btn:hover {
    transform: translate(-1px, -1px);
    box-shadow: 5px 5px 0 #b8410e;
  }

  @media print {
    body { background: white; padding: 0; display: block; }
    .page { box-shadow: none; width: 100%; height: 100vh; margin: 0; }
    .print-btn { display: none; }
  }
</style>
</head>

<button class="print-btn" onclick="window.print()">⎙ Spausdinti A3</button>

<g transform="translate(400, 280)">

  <!-- PCB brand silkscreen -->

  <text x="300" y="43" text-anchor="middle" class="silk" font-size="7" letter-spacing="2" opacity="0.6">ESP32-S3 · 16 RELAY · 16 INPUT · 4G-READY</text>

  <!-- PCF8574 chips for relays -->

    <!-- Block group 2: OUT9-OUT16 (mix of used and free) -->
    <g transform="translate(285, 0)">
      <rect x="0" y="0" width="275" height="22" fill="#1a5f2a" stroke="#0a3018" stroke-width="0.5"/>
      <g stroke="#0a3018" stroke-width="0.5">
        <line x1="34.4" y1="0" x2="34.4" y2="22"/>
        <line x1="68.8" y1="0" x2="68.8" y2="22"/>
        <line x1="103.1" y1="0" x2="103.1" y2="22"/>
        <line x1="137.5" y1="0" x2="137.5" y2="22"/>
        <line x1="171.9" y1="0" x2="171.9" y2="22"/>
        <line x1="206.3" y1="0" x2="206.3" y2="22"/>

  <!-- ═══════════ LEFT EDGE: Power, USB, LAN ═══════════ -->
  <g transform="translate(0, 80)">
    <!-- 12V Power input terminal -->

  <!-- ═══════════ RIGHT EDGE: I2C, UART, RS485, 4G ═══════════ -->
